scraper_image: gcr.io/answers-engine-cloud/dhero-scraper-worker:latest

# Uncomment when any page uses fetch_type: "browser"
# browser_fetcher_image: gcr.io/answers-engine-cloud/fetch-browser-chrome1

env_vars:
  - name: DBHOST
    global_name: DBHOST
    disabled: false
  - name: DBNAME
    global_name: DBNAME
    disabled: false
  - name: DBUSER
    global_name: DBUSER
    disabled: false
  - name: DBPASS
    global_name: DBPASS
    disabled: false

seeder:
  file: ./seeder/seeder.rb
  disabled: false

parsers:
  - page_type: listings
    file: ./parsers/listings.rb
    disabled: false
  - page_type: restaurant_details
    file: ./parsers/restaurant_details.rb
    disabled: false
  - page_type: menu_listings
    file: ./parsers/menu_listings.rb
    disabled: false
  - page_type: menu
    file: ./parsers/menu.rb
    disabled: false

# Re-run parsers on fetch-failed pages so error-taxonomy handling + debug
# collections (restaurant_not_found, *_fetch_failed) capture them.
parse_failed_pages: true

# Optional post-job dedup/normalize pass. Enable only when the source emits
# duplicate restaurants across pages/cities.
finisher:
  file: ./finisher/finisher.rb
  disabled: true

exporters:
  # A3 — menu items (full row, internal fields stripped)
  - exporter_name: items_a3
    exporter_type: json
    collection: items
    write_mode: line
    start_on_job_done: true
    export_filename: <name>_A3Items_<d:yyyyMMdd>
    no_subfolder: true
    export_extension: json.gz
    no_tar: true
    excluded_fields:
      - _id
      - _gid
      - _collection
      - _created_at
      - _job_id
      - id
      - restaurant_id

  # A1 — restaurant core location data (address, contact, rating, hours, tags, delivery zones)
  - exporter_name: locations_a1
    exporter_type: json
    collection: locations
    write_mode: line
    start_on_job_done: true
    export_filename: <name>_A1Restaurants_<d:yyyyMMdd>
    no_subfolder: true
    export_extension: json.gz
    no_tar: true
    excluded_fields:
      - _id
      - _gid
      - _collection
      - _created_at
      - _job_id
      - id
      - restaurant_id
      - cuisine_name
      - img_url
      - description
      - free_field
      - crawled_source

  # A2 — restaurant rich data (hours, tags, delivery zones, cuisine list, free_field)
  - exporter_name: locations_a2
    exporter_type: json
    collection: locations
    write_mode: line
    start_on_job_done: true
    export_filename: <name>_A2Restaurants_<d:yyyyMMdd>
    no_subfolder: true
    export_extension: json.gz
    no_tar: true
    excluded_fields:
      - _id
      - _gid
      - _collection
      - _created_at
      - _job_id
      - id
      - restaurant_id
      - restaurant_name
      - restaurant_address
      - restaurant_post_code
      - restaurant_area
      - restaurant_lat
      - restaurant_long
      - restaurant_city
      - restaurant_country
      - restaurant_delivers
      - phone_number
      - restaurant_rating
      - restaurant_position
      - number_of_ratings
      - main_cuisine
      - is_permanently_closed
      - input_lat
      - input_long
      - img_url
      - description
      - crawled_source
