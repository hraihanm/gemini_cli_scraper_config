   - Identify page types:
     * Categories page (main navigation)
     * Subcategories page (nested navigation) - optional
     * Listings page (product grid/list)
     * Details page (individual product)
   - Determine navigation depth:
     * Flat: listings directly from home
     * One level: categories → listings
     * Two levels: categories → subcategories → listings
     * Three+ levels: handle hierarchy

7) Discover sample URLs:
