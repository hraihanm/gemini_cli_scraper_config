=== STEP 4: Site Discovery ===
5) Navigate to site URL (from {{args}} parameter):
   - Extract URL from {{args}}: `url="https://example.com"` → use `https://example.com`
   - browser_navigate(extracted_url)
   
   **🚨 CRITICAL PRIORITY: Handle popups/overlays FIRST before any other operations**
   **IMPORTANT**: Document successful popup handling in discovery-state.json for reuse in later phases
   
   **Popup Handling Workflow** (execute immediately after navigation):
   
   a) **Step 1 - Check for popups**:
      - browser_snapshot() to check accessibility tree for popup elements
      - browser_screenshot() to visually inspect for popups/modals/cookie banners
   
   b) **Step 2 - First strategy: ESC key press**:
      - If popup detected (in snapshot or screenshot):
        * Try pressing ESC key using browser_press_key("Escape") to dismiss modal/overlay
        * **Note**: ESC key often closes modals, popups, and overlays without needing to find buttons
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document method as "esc_key" in discovery-state.json under `popup_handling.handling_method`
        * **If failed (popup still present)**: Proceed to Step 3
   
   c) **Step 3 - Second strategy: Click upper left corner**:
      - If popup still present after Step 2:
        * Click in the upper left corner of the viewport (e.g., coordinates 10, 10) using browser_mouse_click_xy("Upper left corner", 10, 10)
        * **Note**: This often dismisses overlays/modals that can be closed by clicking outside the content area
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document method as "corner_click" in discovery-state.json under `popup_handling.handling_method`
        * **If failed (popup still present)**: Proceed to Step 4
   
   d) **Step 4 - Third strategy: Selector-based attempt (1 attempt only)**:
      - If popup detected in snapshot:
        * Use browser_click() with element ref or selector to interact:
          - Cookie banners: Click "Accept", "Accept All", or "I Agree" buttons
          - Notifications: Click "Later", "Not Now", or "Skip" buttons
          - Popups/modals: Click close button (X), "Close", or overlay to dismiss
        * Common selectors to check: `[id*="cookie"]`, `[class*="cookie"]`, `[id*="popup"]`, `[class*="modal"]`, `button:contains("Accept")`, `button:contains("Later")`
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document selector/ref in discovery-state.json under `popup_handling.successful_selectors`
        * **If failed (popup still present)**: Proceed to Step 5
   
   e) **Step 5 - Final fallback: Coordinate-based on specific button (if Step 4 failed)**:
      - If popup visible in screenshot BUT NOT dismissed by Step 4 (or not in snapshot):
        * Analyze screenshot (AI vision) to identify button location
        * Extract coordinates (x, y) from button center region
        * Use browser_mouse_click_xy("Accept button", x, y) to click by coordinates
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * **Important**: Coordinate clicks are viewport-relative; click center of button region, not edge
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document coordinates and viewport size in discovery-state.json under `popup_handling.coordinate_clicks`
   
   f) **Step 6 - Final verification**:
      - browser_snapshot() to confirm page is ready (no popups blocking interaction)
      - **Only proceed to page analysis after popups are confirmed dismissed**
   
   **Documentation**: Store successful popup handling strategy in discovery-state.json for reuse in later phases
   
   - browser_snapshot() to understand page structure

6) Analyze site structure:
