=== STEP 7: Write Discovery Knowledge ===
13) Save discovery-knowledge.md (USE ABSOLUTE PATH):
    Include:
    - Scraping approach: API-based
    - Fetch strategy decision: standard vs browser, and why
    - All discovered API endpoints with URL patterns
    - Response structure documentation for each endpoint (from downloaded files)
    - Pagination patterns (queue all upfront vs next-page)
    - Cookie/session management strategy
    - Authentication requirements
    - Field mapping (API field → output field)
    - Downloaded sample response files (cache/ directory)
    - Notes on rate limiting or special requirements

=== STEP 8: Update Boilerplate Files ===
14) Update `lib/headers.rb` (USE ABSOLUTE PATH):
    - Update BASE_URL with site URL
    - **NEW**: Add API_BASE_URL constant with discovered API base URL
    - Add any required API headers (tokens, keys) if public

15) Update `seeder/seeder.rb` (USE ABSOLUTE PATH):
    - Update url with site URL (homepage)
    - Set fetch_type to "browser" (initial page load to capture cookies)
    - The seeder page entry should:
      * Load the homepage with browser to capture cookies
      * Set page_type to "categories" so the categories parser receives the page
      * Pass cookies forward via vars or response_cookie

16) Verify config.yaml (USE ABSOLUTE PATH):
    - Ensure structure is correct from boilerplate

=== STEP 9: Update Phase Status ===
17) Update phase-status.json
18) Save browser-context.json

=== STEP 9b: Write Session Audit ===
18b) Save session-audit-api_scrape.json (USE ABSOLUTE PATH):
   **Purpose**: Compact record of this session for the `/dmart-analyze-phase` improvement loop.
