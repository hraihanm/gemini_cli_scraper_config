description = "Phase 1 (API): Site discovery with API endpoint detection. Copies boilerplate, discovers API endpoints via browser_network_search, downloads sample responses with browser_network_download, writes API-specific discovery state."

prompt = """
You are performing Phase 1 (API Approach): Site Discovery with API Endpoint Detection using the dmart_dloc_boilerplate template. This variant focuses on discovering **JSON/XML API endpoints** (XHR/fetch) that return structured data, rather than HTML CSS selectors.

🚨🚨🚨 **CRITICAL: YOU ARE IN GEMINI CLI - USE TOOLS DIRECTLY, NEVER GENERATE CODE** 🚨🚨🚨
- **STOP**: If you are about to write `import os`, `import json`, `print()`, `def `, or any Python/JavaScript code, STOP IMMEDIATELY
- **YOU ARE AN AI ASSISTANT IN GEMINI CLI** - You have direct access to MCP tools via tool calling
- **USE TOOLS DIRECTLY** - Call tools like `read_file`, `browser_navigate`, `browser_network_search`, `browser_network_download`, `browser_request`, `write_file` using the tool interface
- **FORBIDDEN**: Never write Python scripts, JavaScript code, or any programming code
- **CODE EXAMPLES IN THIS PROMPT ARE FOR REFERENCE ONLY** - They show tool call patterns and Ruby parser code, NOT code to write/execute
- **YOU ARE THE EXECUTOR** - Execute actions directly using tools, don't write code that executes actions
- **IF YOU START WRITING CODE**: Stop immediately and use tools instead

🚨 **API-FIRST APPROACH**:
- **This command discovers API endpoints** that return JSON/XML data for categories, listings, and product details
- **Instead of CSS selectors**, we find XHR/fetch endpoints that the site's JavaScript uses to load data
- **Key tools**:
  - `browser_network_search` - searches across captured network request URLs, headers, and response bodies
  - `browser_network_download` - downloads a captured network response body to a file for testing
  - `browser_request` - makes arbitrary HTTP requests from the browser context (inherits cookies/session)
- **Workflow**: Navigate to page → let JavaScript load data → `browser_network_search({query: "product_name"})` → identify API endpoints → `browser_network_download` to save responses → verify with `browser_request`

🚨 **API FETCH STRATEGY: ALWAYS USE `fetch_type: "standard"`**:
For API agents, **MUST use `fetch_type: "standard"`** (direct HTTP fetch). Do NOT use `fetch_type: "browser"` for API endpoints.

**Why standard fetch is required**:
- **Browser returns XML/HTML-wrapped content** — When Chromium navigates to an API URL, it renders the response as a document. JSON APIs get wrapped in HTML; XML APIs return XML. Parsers expect raw JSON, not HTML/XML wrappers.
- **Standard fetch returns raw response** — Direct HTTP fetch returns the exact API response body (JSON or XML) as received, so `JSON.parse(content)` works correctly.
- **Consistent parser logic** — All API parsers use `JSON.parse(content)` and JSON path traversal; no HTML/XML extraction needed.

**Pattern: `fetch_type: "standard"` (REQUIRED for API endpoints)**
- DataHen fetches the API URL directly via HTTP (no browser needed)
- `content` = raw JSON string → parser uses `JSON.parse(content)` directly
- Requires passing cookies/headers explicitly in page entry
- Example: `pages << { url: api_url, fetch_type: "standard", headers: { 'Cookie' => cookie, 'Accept' => 'application/json' }, ... }`

**Cookie/auth handling with standard fetch**:
- Initial seeder uses `fetch_type: "browser"` to load homepage and capture cookies
- Pass cookies to API pages via `vars` or `headers: { 'Cookie' => cookie }`
- API parsers receive raw JSON in `content`

🚨 **COOKIE/SESSION MANAGEMENT**:
- Initial browser fetch captures cookies via `page['response_cookie']`
- Pass cookies to subsequent API pages via `vars` hash: `vars: { cookie: page['response_cookie'] }`
- In parsers, read cookies: `cookie = page['vars']['cookie'] rescue page['response_cookie']`
- Or set directly on page entry: `cookie: cookie_string`

🚨 **CRITICAL AUTO-CHAINING EXECUTION RULE**:
- **MANDATORY**: If `auto_next=true` parameter is provided in `{{args}}`, you MUST execute the next command automatically

🚨 **BOILERPLATE-BASED APPROACH**:
- **Step 1**: Copy `templates/dmart_dloc_boilerplate/` to `generated_scraper/<scraper_name>/`
- **Step 2**: Discover API endpoints using browser_network_search
- **Step 3**: Download sample API responses using browser_network_download
- **Step 4**: Verify API calls work independently using browser_request
- **Step 5**: Edit boilerplate files with discovered API info
- **Step 6**: Write API-specific discovery state for next phases

🚨 CRITICAL - ABSOLUTE PATHS REQUIRED:
- **ALL WriteFile operations MUST use ABSOLUTE PATHS** - Relative paths will fail

🚨 **EXPENSIVE TOOL JUSTIFICATION** (required before each expensive call):
Before calling `browser_view_html`, `browser_network_download`, `browser_request`, `parser_tester`, or `datahen_run`, write one line:
  💭 [tool]: [what I expect to find/confirm] → [why not a cheaper alternative]
Examples:
  💭 browser_view_html: need full DOM for category list — browser_grep_html returned no results
  💭 browser_request: fetching categories JSON for store_id=1003594 — not yet in network capture
  💭 browser_network_download: saving listings API response — matched URL found via browser_network_search
Always try cheap alternatives first: `browser_grep_html` before `browser_view_html`, `browser_network_search` before `browser_network_download`/`browser_request`

Inputs (order-agnostic via {{args}}):
  - url=<site_url> (REQUIRED - target website URL)
  - name=<scraper_name> (REQUIRED)
  - spec=<path-to-field-spec.json> (OPTIONAL - defaults to spec_full.json)
  - out=<base_dir> (OPTIONAL, default: "./generated_scraper")
  - auto_next=true|false (OPTIONAL, default: false) - If true, automatically execute next command (/dmart-api-navigation-parser)

Process:

=== STEP 1: Load Existing State Files (if exist) ===
1) Load existing state files using read_file tool:
   - Read `generated_scraper/<scraper>/.scraper-state/phase-status.json` (if exists)
   - Read `generated_scraper/<scraper>/.scraper-state/discovery-state.json` (if exists)
   - Read `generated_scraper/<scraper>/.scraper-state/discovery-knowledge.md` (if exists)
   - Handle missing files gracefully

2) Handle results:
   - If phase-status.json exists and site_discovery.status == "completed": Display summary, suggest next phase
   - If "in_progress": Resume from checkpoint
   - Else: Start fresh discovery

=== STEP 2: Copy Boilerplate Template ===
3) Check if scraper directory exists:
   - If exists: Read existing files, only update what needs changes
   - If NOT exists: Copy `templates/dmart_dloc_boilerplate/` to `generated_scraper/<scraper>/`
     * Windows: `xcopy /E /I /Y templates\\dmart_dloc_boilerplate generated_scraper\\<scraper>`
   - Verify copy was successful

4) Verify boilerplate structure:
   - Read config.yaml, seeder.rb, lib/headers.rb, parsers/categories.rb, parsers/details.rb

=== STEP 3: Copy Field Specification ===
5) Copy field-spec.json to `.scraper-state/` using file copy command (NOT read_file + write_file):
   - Source: `spec` parameter or default `spec_full.json`
   - Destination: `generated_scraper/<scraper>/.scraper-state/field-spec.json`
   - Use `copy` (Windows) or `cp` (Linux) via run_terminal_cmd

=== STEP 4: Initialize State Directory ===
6) Create `.scraper-state/` directory if needed
7) Initialize phase-status.json with site_discovery in_progress

=== STEP 5: Site Discovery with API Endpoint Detection ===
8) Navigate to site URL:
   - browser_navigate(url)

   **🚨 CRITICAL: Handle popups/overlays FIRST** (same popup handling workflow as dmart-scrape: ESC → corner click → selector click → coordinate click → verify)

   - browser_snapshot() to understand page structure

9) **🚨 API ENDPOINT DISCOVERY** (the core differentiator from HTML approach):

   a) **Wait for page to fully load** - API calls are triggered by JavaScript:
      - browser_wait_for({time: 3}) to let XHR/fetch requests complete

   b) **Search for product/category data in network requests**:
      - Use `browser_network_search` to find API endpoints:
        ```
        browser_network_search({
          query: "category",
          searchIn: ["url", "responseBody"],
          maxResults: 10,
          contextChars: 200
        })
        ```
      - Try multiple search terms:
        * "category" or "categories" - find category listing APIs
        * "product" or "products" - find product listing APIs
        * A visible product name from the page - find product data APIs
        * "price" - find pricing APIs
        * "page" or "offset" or "limit" - find pagination patterns

   c) **Identify API endpoint patterns**:
      - Look for JSON responses (Content-Type: application/json) or XML responses
      - Identify base API URL (e.g., `https://api.example.com/v2/`)
      - Identify authentication headers (API keys, tokens, cookies)
      - Identify pagination parameters (page, offset, limit, cursor)
      - Identify category/product ID patterns in URLs

   d) **🚨 Download sample API responses using browser_network_download**:
      For each discovered API endpoint, download the response body:
        ```
        browser_network_download({
          urlPattern: "api.example.com/categories",
          outputPath: "D:\\path\\to\\generated_scraper\\<scraper>\\cache\\categories-api.json"
        })
        ```
      - Save to `generated_scraper/<scraper>/cache/` directory
      - Download at least: categories response, listings response, detail response
      - These files will be used later for parser testing with parser_tester

   e) **🚨 Verify API endpoints work independently using browser_request**:
      For each discovered endpoint, replay the API call:
        ```
        browser_request({
          url: "https://api.example.com/v2/categories",
          method: "GET",
          headers: {"Accept": "application/json"},
          outputPath: "D:\\path\\to\\generated_scraper\\<scraper>\\cache\\categories-verify.json"
        })
        ```
      - This confirms the API call works with the browser's cookies/session
      - Compare with the captured response to ensure consistency
      - **API endpoints MUST use `fetch_type: "standard"`** — browser returns XML/HTML, not raw JSON
      - If browser_request fails: ensure cookies/headers are passed; pass them to subsequent standard fetches via vars

   f) **Set fetch_type to "standard" for all API endpoints**:
      - API agents MUST use `fetch_type: "standard"` — browser returns XML/HTML-wrapped content, not raw JSON
      - Test if API requires cookies: Try `browser_request` with and without `Cookie` header
      - Document: headers/cookies required for each endpoint

   g) **Map API response structure**:
      For each endpoint, document (from downloaded files):
      - Response format (JSON object, array, paginated wrapper)
      - Key fields: where product name, price, image, etc. live in the JSON
      - Pagination: total_count / per_page = total_pages, loop `(2..total_pages)`
      - Total count: field path in response metadata

10) **Navigate through site to trigger more API calls**:
    - Click on a category to trigger category listing API
    - Use browser_network_search to capture the API call
    - **Download the response**: browser_network_download to save it
    - Click on a product to trigger detail API
    - Use browser_network_search to capture the detail API call
    - **Download the response**: browser_network_download to save it
    - Document each endpoint discovered

11) **Analyze site structure from API perspective**:
    - Determine navigation depth from API endpoints:
      * Categories API → Subcategories API → Product listing API → Product detail API
    - Identify if APIs use:
      * REST patterns (/categories/123/products)
      * GraphQL (single endpoint, query-based) - if GraphQL, document query structure and Base64 encoding
      * Custom API patterns
    - Document API authentication requirements
    - Document cookie/session flow between parsers

=== STEP 6: Write API-Specific Discovery State ===
