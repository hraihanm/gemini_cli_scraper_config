=== STEP 5: Site Discovery ===
8) Navigate to site URL (from {{args}} parameter):
   - Extract URL from {{args}}: `url="https://example.com"` → use `https://example.com`
   - browser_navigate(extracted_url)
   
   **🚨 CRITICAL PRIORITY: Handle popups/overlays FIRST before any other operations**
   **IMPORTANT**: Document successful popup handling in discovery-state.json for reuse in later phases
   
   **Popup Handling Workflow** (execute immediately after navigation):
   
   a) **Step 1 - Check for popups**:
      - browser_snapshot() to check accessibility tree for popup elements
      - browser_screenshot() to visually inspect for popups/modals/cookie banners
   
   b) **Step 2 - First strategy: ESC key press**:
      - If popup detected (in snapshot or screenshot):
        * Try pressing ESC key using browser_press_key("Escape") to dismiss modal/overlay
        * **Note**: ESC key often closes modals, popups, and overlays without needing to find buttons
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document method as "esc_key" in discovery-state.json under `popup_handling.handling_method`
        * **If failed (popup still present)**: Proceed to Step 3
   
   c) **Step 3 - Second strategy: Click upper left corner**:
      - If popup still present after Step 2:
        * Click in the upper left corner of the viewport (e.g., coordinates 10, 10) using browser_mouse_click_xy("Upper left corner", 10, 10)
        * **Note**: This often dismisses overlays/modals that can be closed by clicking outside the content area
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document method as "corner_click" in discovery-state.json under `popup_handling.handling_method`
        * **If failed (popup still present)**: Proceed to Step 4
   
   d) **Step 4 - Third strategy: Selector-based attempt (1 attempt only)**:
      - If popup detected in snapshot:
        * Use browser_click() with element ref or selector to interact:
          - Cookie banners: Click "Accept", "Accept All", or "I Agree" buttons
          - Notifications: Click "Later", "Not Now", or "Skip" buttons
          - Popups/modals: Click close button (X), "Close", or overlay to dismiss
        * Common selectors to check: `[id*="cookie"]`, `[class*="cookie"]`, `[id*="popup"]`, `[class*="modal"]`, `button:contains("Accept")`, `button:contains("Later")`
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document selector/ref in discovery-state.json under `popup_handling.successful_selectors`
        * **If failed (popup still present)**: Proceed to Step 5
   
   e) **Step 5 - Final fallback: Coordinate-based on specific button (if Step 4 failed)**:
      - If popup visible in screenshot BUT NOT dismissed by Step 4 (or not in snapshot):
        * Analyze screenshot (AI vision) to identify button location
        * Extract coordinates (x, y) from button center region
        * Use browser_mouse_click_xy("Accept button", x, y) to click by coordinates
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * **Important**: Coordinate clicks are viewport-relative; click center of button region, not edge
        * browser_snapshot() to verify popup dismissed
        * **If successful**: Document coordinates and viewport size in discovery-state.json under `popup_handling.coordinate_clicks`
   
   f) **Step 6 - Final verification**:
      - browser_snapshot() to confirm page is ready (no popups blocking interaction)
      - **Only proceed to page analysis after popups are confirmed dismissed**
   
   **Documentation**: Store successful popup handling strategy in discovery-state.json for reuse in later phases
   
   - browser_snapshot() to understand page structure

9) **MANDATORY**: Detect browser fetch requirements (check if categories need JavaScript/button clicks):
   **CRITICAL**: This detection determines if the initial page needs "browser" fetch_type with puppeteer driver code
   
   a) **Check if category links are visible in DOM**:
      - Use `browser_evaluate()` to check if category links exist in the DOM:
        ```javascript
        browser_evaluate(() => {
          // Try common category selectors
          const categorySelectors = [
            '.category-item a',
            '.nav-menu a',
            '.category-link',
            '[class*="category"] a',
            'nav a[href*="category"]',
            'a[href*="/category"]',
            'a[href*="/categories"]'
          ];
          
          for (const selector of categorySelectors) {
            try {
              const elements = document.querySelectorAll(selector);
              if (elements.length > 0) {
                return {
                  found: true,
                  selector: selector,
                  count: elements.length,
                  sampleText: Array.from(elements).slice(0, 3).map(el => el.textContent.trim())
                };
              }
            } catch (e) {
              // Selector might not be valid, continue
            }
          }
          
          return { found: false, message: "No category links found in DOM" };
        });
        ```
      - **If categories found**: Document that standard fetch_type can be used
      - **If categories NOT found**: Proceed to step 9b to look for reveal buttons
   
   b) **If categories not found, look for buttons that reveal categories**:
      - Use `browser_snapshot()` to visually inspect for menu buttons, hamburger icons, "Show Categories" buttons
      - Use `browser_evaluate()` to find potential reveal buttons:
        ```javascript
        browser_evaluate(() => {
          const buttonSelectors = [
            'button[aria-label*="menu" i]',
            'button[aria-label*="category" i]',
            '.menu-toggle',
            '.hamburger',
            '[class*="menu-toggle"]',
            '[class*="hamburger"]',
            '[id*="menu-toggle"]',
            '[id*="hamburger"]',
            'button:contains("Menu")',
            'button:contains("Categories")',
            'button:contains("Show")'
          ];
          
          const foundButtons = [];
          for (const selector of buttonSelectors) {
            try {
              const buttons = document.querySelectorAll(selector);
              if (buttons.length > 0) {
                foundButtons.push({
                  selector: selector,
                  count: buttons.length,
                  text: Array.from(buttons).map(b => b.textContent.trim()),
                  visible: Array.from(buttons).some(b => {
                    const style = window.getComputedStyle(b);
                    return style.display !== 'none' && style.visibility !== 'hidden';
                  })
                });
              }
            } catch (e) {
              // Selector might not be valid, continue
            }
          }
          
          return foundButtons;
        });
        ```
      - **If buttons found**: Proceed to step 9c to test clicking
      - **If no buttons found**: Document that categories might require JavaScript (but no button clicks)
   
   c) **Test button click to verify categories appear**:
      - Use `browser_inspect_element()` on the button to get its real CSS selector
      - Use `browser_click()` with element ref to click the button
      - Wait 2-3 seconds using `browser_evaluate()` with sleep:
        ```javascript
        browser_evaluate(() => {
          return new Promise(resolve => setTimeout(resolve, 2000));
        });
        ```
      - **Verify categories appear**:
        ```javascript
        browser_evaluate(() => {
          const categories = document.querySelectorAll('.category-item a, .nav-menu a, [class*="category"] a');
          return {
            categoriesFound: categories.length > 0,
            count: categories.length,
            sampleText: Array.from(categories).slice(0, 5).map(el => el.textContent.trim())
          };
        });
        ```
      - **If categories appear after click**: Document button selector, wait time, and puppeteer code
      - **If categories still not found**: Document that JavaScript might be required but button click didn't work
   
   d) **Document findings in discovery-state.json** (see step 11 for JSON structure):
      - Set `fetch_requirements.initial_page_needs_browser` to true/false
      - Set `fetch_requirements.categories_need_browser` to true/false
      - If button found: Document `fetch_requirements.button_to_reveal_categories` with:
        * `exists`: true/false
        * `selector`: CSS selector of the button
        * `puppeteer_code`: Generated puppeteer code (e.g., "await page.click('button.menu-toggle'); await sleep(2000);")
        * `wait_time_ms`: Wait time in milliseconds (typically 2000ms)
        * `verified`: true if categories appeared after click
      - **CRITICAL**: This information will be used in step 13 to configure seeder.rb

10) Analyze site structure:
   - Detect navigation patterns:
     * Main menu/category links
     * Breadcrumb structure
     * Product listing patterns
     * Pagination indicators
   - Identify page types:
     * Categories page (main navigation)
     * Subcategories page (nested navigation) - optional
     * Listings page (product grid/list)
     * Details page (individual product)
   - Determine navigation depth:
     * Flat: listings directly from home
     * One level: categories → listings
     * Two levels: categories → subcategories → listings
     * Three+ levels: handle hierarchy

11) Discover sample URLs:
   - Navigate through site to find:
     * Sample category URL
     * Sample subcategory URL (if applicable)
     * Sample listings URL
     * Sample detail URL (if accessible from home/listings)
   - Document each URL with its purpose
   - **TRACK ALL URLs**: Record all URLs accessed during discovery in discovery-state.json under `urls_accessed.discovery_urls` array
   - Update `urls_accessed.last_accessed_url` and `urls_accessed.last_accessed_at` after each navigation

