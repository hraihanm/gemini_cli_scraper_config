Process:

🚨 **BEFORE YOU START**: Remember - USE TOOLS DIRECTLY, DO NOT WRITE CODE. Call read_file tool for each file individually.

=== STEP 1: Load State Files (if exist) ===
**CRITICAL**: Read files one by one using read_file tool
