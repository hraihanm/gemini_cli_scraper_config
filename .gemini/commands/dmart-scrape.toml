   **WORKFLOW** (follow exactly - USE FILE COPY COMMAND):
   
   b) **Copy file using run_terminal_cmd** (FILE COPY - NOT read_file + write_file):
      - **Source**: Absolute path from step 5a
      - **Destination**: `generated_scraper/<scraper>/.scraper-state/field-spec.json` (absolute path)
      - **Windows**: Use `copy` command: `copy "<source_absolute_path>" "<destination_absolute_path>"`
      - **Linux/Mac**: Use `cp` command: `cp "<source_absolute_path>" "<destination_absolute_path>"`
      - **CRITICAL**: Use `run_terminal_cmd` tool to execute the copy command
      - **CRITICAL**: Do NOT use read_file tool
      - **CRITICAL**: Do NOT use write_file tool
      - **CRITICAL**: Just copy the file directly - no parsing, no modification, no reconstruction
   
   c) **Optional: Update metadata after copy** (only if needed):
      - After copying, you may optionally read the copied file and update:
        * discovery_status (calculate counts from fields array)
        * source_file: Set to source file path
        * parsed_at: current timestamp
      - **BUT**: This is OPTIONAL - the file copy is the primary operation
      - **Note**: dmart-details-parser will update discovery_status during field discovery anyway
   
   **FORBIDDEN** (causes reconstruction):
      ❌ DO NOT use read_file + write_file for this step
      ❌ DO NOT parse JSON and reconstruct
      ❌ DO NOT iterate through fields
      ❌ DO NOT build JSON structure
      ❌ DO NOT serialize JSON manually
   
   **REQUIRED** (preserves file exactly):
