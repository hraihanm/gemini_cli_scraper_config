description = "Resume work from session progress file. Loads previous discoveries and continues from where you left off."

prompt = """
You are resuming work from a previous session that was interrupted.

**CRITICAL FIRST STEP:**
1. Check for session progress file: `generated_scraper/<scraper_name>/.scraper-state/session-progress.json`
2. Also check existing state files: `detail-selectors.json`, `phase-status.json`, `navigation-selectors.json`
3. If found, load and display summary of completed work
4. Continue from the "next_steps" listed in progress file
5. DO NOT re-do work marked as "completed" in completed_discoveries

Inputs (order-agnostic via {{args}}):
  - scraper=<scraper_name> (REQUIRED)
  - task=<task_description> (OPTIONAL - override current_task from progress file)

Process:

1) Load Session Progress:
   - Check `generated_scraper/<scraper>/.scraper-state/session-progress.json`
   - Also load existing state files:
     * `detail-selectors.json` - shows discovered selectors
     * `phase-status.json` - shows completed phases
     * `navigation-selectors.json` - navigation selectors (if exists)
   - Load the most recent session progress file

2) Display Resume Summary:
   ```
   Resuming work for scraper: <scraper_name>
   
   Session: <session_id>
   Last Activity: <last_activity>
   Current Task: <current_task>
   
   Completed Discoveries:
   - <completed_item_1>: <details>
   - <completed_item_2>: <details>
   
   In Progress:
   - <in_progress_item>: <status>
   
   Current URL: <current_url>
   Next Steps:
   1. <next_step_1>
   2. <next_step_2>
   ```

3) Continue Work:
   - Start from the first item in "next_steps"
   - Reference completed_discoveries (don't re-discover)
   - Use current_url if browser navigation needed
   - Update session-progress.json as you make progress

4) If No Progress File Found:
   - Ask user for manual summary of where they left off
   - Create new session-progress.json with user's input
   - Begin work from that point

Examples:
  /resume-work scraper=naivas_online
  /resume-work scraper=my_store task="completing base_price selector"
"""

