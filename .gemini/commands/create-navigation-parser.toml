19) Generate or modify parsers/listings.rb (USE ABSOLUTE PATH):
   **CRITICAL**: If parser exists, modify it instead of regenerating
   
   🚨 **CRITICAL: DataHen v3 Parser Structure**:
   - **DataHen parsers are TOP-LEVEL SCRIPTS, NOT FUNCTIONS**
   - **NEVER** use `def parse(...)` or any function definition
   - **NEVER** declare `pages = []` or `outputs = []` - these are pre-defined by DataHen
   - **NEVER** declare `page` or `content` - these are pre-defined and available at script level
   - **ALWAYS** start directly with `html = Nokogiri::HTML(content)` - no function wrapper
   - **ALWAYS** use reserved variables directly: `pages << {...}` and `outputs << {...}`
   - **VALIDATION**: Before writing code, scan for function definitions and reserved variable declarations and remove them
   
   **Why**: DataHen executes parser files as scripts directly. It does NOT call functions. The parser script has access to pre-defined variables (`content`, `page`, `pages`, `outputs`) at the top level.
   
   a) If parser exists:
      - Read existing parser code
      - **Check for reserved variable declarations** (pages = [], outputs = []) and remove them
      - Identify selector locations (product links, pagination)
      - Update selectors with newly discovered ones
      - Preserve existing logic (pagination handling, vars passing)
      - Keep working parts, fix broken selectors
   
   b) If parser doesn't exist:
      - Generate new parser from scratch
      - **CRITICAL**: Never declare reserved variables
   
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   base_url = vars['base_url'] || page['url'].split('/')[0..2].join('/')
   
   # Extract product links
   # NOTE: pages is pre-defined by DataHen - DO NOT declare it (pages = [] is FORBIDDEN)
   products = html.css('.product-link-selector')  # Discovered selector
   products.each_with_index do |product, idx|
     product_url = product['href'] || product.at_css('a')['href']
     product_url = base_url + product_url unless product_url.start_with?('http')
     
     pages << {  # pages is pre-defined, use directly
       url: product_url,
       page_type: "details",
       vars: vars.merge({
         rank: idx + 1,
         page_number: vars['page'] || 1,
         listing_position: idx + 1
       })
     }
     
     # Save pages periodically inside loop to avoid memory issues
     save_pages if pages.count > 99
   end
   
   # Pagination handling
   # Standard pagination (query param, path, or next button)
   next_button = html.at_css('.next-page, a[aria-label="Next"], .load-more, .show-more')
   if next_button && next_button['href']
     next_url = next_button['href']
     next_url = base_url + next_url unless next_url.start_with?('http')
     pages << {  # pages is pre-defined, use directly
       url: next_url,
       page_type: "listings",
       vars: vars.merge({ page: (vars['page'] || 1).to_i + 1 })
     }
     save_pages if pages.count > 99
   end
   
   # Infinite scroll pagination (if detected during discovery)
   # Note: Infinite scroll requires browser automation - handled by DataHen's browser capabilities
   # If infinite scroll was detected, document API endpoint in navigation-selectors.json
   # The parser should extract all visible products, and DataHen will handle scrolling
   ```

