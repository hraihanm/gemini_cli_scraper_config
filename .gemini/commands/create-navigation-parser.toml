description = "Phase 2: Generate navigation parsers (categories, subcategories, listings). Reads discovery knowledge, writes navigation knowledge, completes independently."

prompt = """
You are performing Phase 2: Navigation Parser Generation. This command is COMPLETELY INDEPENDENT - it reads discovery state files, generates parsers, writes ALL findings, and completes. No conversation history needed.

🚨 MODULAR DESIGN PRINCIPLES:
1. **Read State Files First** - Load discovery-state.json and discovery-knowledge.md
2. **Write ALL Findings** - Before completion, write everything discovered
3. **Write Knowledge Files** - Human-readable + AI-readable summaries
4. **Self-Contained** - All needed info from state files
5. **Clear Completion** - Report what's done, what's next

🚨 CRITICAL - ABSOLUTE PATHS REQUIRED:
- **ALL WriteFile operations MUST use ABSOLUTE PATHS** - Relative paths will fail
- Before writing any file, convert relative path to absolute:
  * Determine workspace root (current working directory)
  * Convert: `generated_scraper/<scraper>/.scraper-state/file.json`
  * To absolute: `<workspace_root>/generated_scraper/<scraper>/.scraper-state/file.json`
- Use absolute paths for: navigation-selectors.json, navigation-knowledge.md, phase-status.json, parser files

Inputs (order-agnostic via {{args}}):
  - scraper=<scraper_name> (REQUIRED - scraper must exist with discovery-state.json)
  - resume-url=<url> (OPTIONAL - resume browser from this URL)
  - out=<base_dir> (OPTIONAL - defaults to ./generated_scraper)

Process:

=== STEP 1: Load State Files ===
**CRITICAL**: Use ReadManyFiles to load state files (ReadFile fails due to ignore patterns)

1) Load all required state files using ReadManyFiles:
   ```javascript
   ReadManyFiles({
     patterns: [
       "generated_scraper/<scraper>/.scraper-state/phase-status.json",
       "generated_scraper/<scraper>/.scraper-state/discovery-state.json",
       "generated_scraper/<scraper>/.scraper-state/discovery-knowledge.md",
       "generated_scraper/<scraper>/.scraper-state/navigation-selectors.json",
       "generated_scraper/<scraper>/.scraper-state/navigation-knowledge.md"
     ],
     target_directory: "<workspace_root>"
   })
   ```

2) Parse loaded files:
   - **phase-status.json**: Check navigation_discovery.status
     * If "completed": Display summary, suggest next phase (`/create-details-parser`)
     * If "in_progress": Resume from checkpoint
     * Else: Start fresh navigation discovery
   - **discovery-state.json**: Extract site structure
     * has_categories, has_subcategories, has_listings
     * navigation_depth
     * sample_urls (category, subcategory, listings)
   - **discovery-knowledge.md**: Read for additional context
   - **navigation-selectors.json**: If exists, check what's already discovered
   - **navigation-knowledge.md**: If exists, read previous discoveries

3) Validate prerequisites:
   - **REQUIRED**: discovery-state.json must exist (run `/scrape-site` first if missing)
   - If missing: Display error: "Discovery not found. Run: /scrape-site url=<url> name=<scraper>"
   - If exists: Continue with navigation parser generation

**Note**: ReadManyFiles will return empty/not found for missing files - handle gracefully.

=== STEP 2: Categories Parser (if has_categories) ===
4) Check checkpoint: If categories_analyzed == true, skip to step 7

5) Navigate and discover:
   - Use sample_urls.category from discovery-state.json
   - browser_navigate(sample_category_url)
   - browser_snapshot()
   - browser_inspect_element() to find category link selectors
   - browser_verify_selector() for category names
   - Discover category link pattern, URL structure

6) Generate parsers/categories.rb (USE ABSOLUTE PATH):
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   base_url = vars['base_url'] || page['url'].split('/')[0..2].join('/')
   
   # Category link selector (discovered via browser tools)
   categories = html.css('.category-link-selector')  # Use discovered selector
   categories.each do |category|
     cat_name = category.text.strip
     cat_url = category['href']
     cat_url = base_url + cat_url unless cat_url.start_with?('http')
     
     pages << {
       url: cat_url,
       page_type: vars['has_subcategories'] ? "subcategories" : "listings",
       vars: vars.merge({
         category_name: cat_name,
         category_level: (vars['category_level'] || 0).to_i + 1,
         breadcrumb: vars['breadcrumb'] ? "#{vars['breadcrumb']} > #{cat_name}" : cat_name
       })
     }
   end
   
   save_pages(pages) if pages.count > 99
   ```

7) Test Categories Parser:
   **MANDATORY**: Test parser immediately after generation
   
   a) Download HTML for testing:
      - Use browser_navigate() to visit sample category URL
      - Use browser_view_html() to get HTML content
      - Save HTML to cache/ directory (or use auto_download in parser_tester)
   
   b) Test with parser_tester MCP tool:
      ```javascript
      parser_tester({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        parser_path: "parsers/categories.rb",
        page_type: "categories",
        html_file: "<absolute_path>/cache/category-page.html",  // OR use auto_download: true
        // OR: auto_download: true  // Downloads from active browser tab
        vars: '{"base_url":"<site_url>"}',
        quiet: false  // Show verbose output for testing
      })
      ```
   
   c) Validate test results:
      - Parser should generate pages with page_type "subcategories" or "listings"
      - Check that category_name and breadcrumb vars are set correctly
      - If test fails: Analyze errors, refine selectors, re-test
      - If test passes: Continue to next parser

8) Save checkpoint:
   ```json
   "navigation_discovery": {
     "checkpoints": {
       "categories_analyzed": true,
       "categories_parser_generated": true,
       "last_category_url": "<current_url>"
     }
   }
   ```

=== STEP 3: Subcategories Parser (if has_subcategories) ===
8) Check checkpoint: If subcategories_analyzed == true, skip to step 11

9) Navigate and discover:
   - Use sample_urls.subcategory from discovery-state.json
   - Discover subcategory link selectors
   - Understand subcategory navigation pattern

10) Generate parsers/subcategories.rb (USE ABSOLUTE PATH):
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   base_url = vars['base_url'] || page['url'].split('/')[0..2].join('/')
   
   subcategories = html.css('.subcategory-link-selector')  # Discovered selector
   subcategories.each do |subcat|
     subcat_name = subcat.text.strip
     subcat_url = subcat['href']
     subcat_url = base_url + subcat_url unless subcat_url.start_with?('http')
     
     pages << {
       url: subcat_url,
       page_type: "listings",
       vars: vars.merge({
         subcategory_name: subcat_name,
         category_name: vars['category_name'],
         breadcrumb: "#{vars['breadcrumb']} > #{subcat_name}"
       })
     }
   end
   
   save_pages(pages) if pages.count > 99
   ```

11) Test Subcategories Parser:
   **MANDATORY**: Test parser immediately after generation
   
   a) Download HTML for testing (use sample subcategory URL)
   b) Test with parser_tester:
      ```javascript
      parser_tester({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        parser_path: "parsers/subcategories.rb",
        page_type: "subcategories",
        html_file: "<absolute_path>/cache/subcategory-page.html",
        // OR: auto_download: true
        vars: '{"category_name":"Electronics","breadcrumb":"Electronics"}',
        quiet: false
      })
      ```
   c) Validate: Should generate pages with page_type "listings"

12) Save checkpoint

=== STEP 4: Listings Parser ===
13) Check checkpoint: If listings_analyzed == true, skip to step 17

14) Navigate and discover:
   - Use sample_urls.listings from discovery-state.json
   - browser_navigate(sample_listings_url)
   - Discover product link selectors
   - Analyze pagination pattern (critical):
     * Query parameter: ?page=2
     * Path: /page/2
     * Infinite scroll detection
     * Next button: .next-page, a[aria-label="Next"]
   - Extract 3-5 sample detail URLs for detail parser

14) Generate parsers/listings.rb (USE ABSOLUTE PATH):
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   base_url = vars['base_url'] || page['url'].split('/')[0..2].join('/')
   
   # Extract product links
   products = html.css('.product-link-selector')  # Discovered selector
   products.each_with_index do |product, idx|
     product_url = product['href'] || product.at_css('a')['href']
     product_url = base_url + product_url unless product_url.start_with?('http')
     
     pages << {
       url: product_url,
       page_type: "details",
       vars: vars.merge({
         rank: idx + 1,
         page_number: vars['page'] || 1,
         listing_position: idx + 1
       })
     }
   end
   
   # Pagination handling
   next_button = html.at_css('.next-page, a[aria-label="Next"]')
   if next_button && next_button['href']
     next_url = next_button['href']
     next_url = base_url + next_url unless next_url.start_with?('http')
     pages << {
       url: next_url,
       page_type: "listings",
       vars: vars.merge({ page: (vars['page'] || 1).to_i + 1 })
     }
   end
   
   save_pages(pages) if pages.count > 99
   ```

15) Test Listings Parser:
   **MANDATORY**: Test parser immediately after generation
   
   a) Download HTML for testing (use sample listings URL)
   b) Test with parser_tester:
      ```javascript
      parser_tester({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        parser_path: "parsers/listings.rb",
        page_type: "listings",
        html_file: "<absolute_path>/cache/listings-page.html",
        // OR: auto_download: true
        vars: '{"category_name":"Electronics","breadcrumb":"Electronics","page":1}',
        quiet: false
      })
      ```
   c) Validate test results:
      - Parser should generate pages with page_type "details"
      - Check that rank, page_number, listing_position vars are set
      - Check pagination: Should generate next listings page if pagination exists
      - Extract sample detail URLs from generated pages for detail parser
      - If test fails: Analyze errors, refine selectors, re-test
      - If test passes: Continue

16) Extract sample detail URLs and save checkpoint

=== STEP 5: Write Navigation Selectors (JSON) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

17) Save navigation-selectors.json (USE ABSOLUTE PATH):
   ```json
   {
     "categories": {
       "category_link_selector": [".category-item a", ".nav-link a"],
       "category_name_selectors": [".category-title", "a"],
       "verified": true,
       "confidence": 0.95,
       "notes": "Categories found in main navigation menu"
     },
     "subcategories": {
       "subcategory_link_selector": [".subcategory-item a"],
       "subcategory_name_selectors": [".subcategory-name"],
       "verified": true,
       "confidence": 0.90
     },
     "listings": {
       "product_link_selector": [".product-item a", ".product-card a"],
       "pagination_next": [".next-page", "a[aria-label='Next']"],
       "pagination_pattern": "query_param",
       "pagination_param": "page",
       "verified": true,
       "confidence": 0.95,
       "sample_detail_urls": [
         "https://example.com/p/123",
         "https://example.com/p/456"
       ]
     }
   }
   ```

=== STEP 6: Update Config.yaml ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

17) Update config.yaml to add navigation parsers (USE ABSOLUTE PATH):
   a) Read existing config.yaml (from generated_scraper/<scraper>/config.yaml)
   b) Parse YAML structure
   c) Add navigation parsers to parsers array:
      ```yaml
      parsers:
        - page_type: categories
          file: ./parsers/categories.rb
          disabled: false
        # Only add if has_subcategories (check discovery-state.json)
        - page_type: subcategories
          file: ./parsers/subcategories.rb
          disabled: false
        - page_type: listings
          file: ./parsers/listings.rb
          disabled: false
      ```
   d) Write updated config.yaml (preserve seeder section, update parsers array)
   
   **Note**: Keep existing seeder section, only update parsers array. Details parser will be added by create-details-parser.

=== STEP 7: Write Navigation Knowledge (Markdown) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

18) Save navigation-knowledge.md (USE ABSOLUTE PATH):
   ```markdown
   # Navigation Parser Knowledge - <scraper_name>
   
   **Completed**: <timestamp>
   **Phase**: Navigation Discovery
   
   ## Parsers Generated
   
   ### Categories Parser (parsers/categories.rb)
   - **Status**: ✅ Complete
   - **Selector**: `.category-item a`
   - **Discovery Method**: Browser inspection of main navigation
   - **Verified**: Yes, tested on 3 category pages
   - **Edge Cases**: Some categories have subcategories (handled in subcategories parser)
   - **Notes**: Categories page has 12 main categories
   
   ### Subcategories Parser (parsers/subcategories.rb)
   - **Status**: ✅ Complete
   - **Selector**: `.subcategory-item a`
   - **Discovery Method**: Browser inspection of category detail pages
   - **Verified**: Yes, tested on 2 subcategory pages
   - **Notes**: Subcategories appear in sidebar
   
   ### Listings Parser (parsers/listings.rb)
   - **Status**: ✅ Complete
   - **Product Link Selector**: `.product-card a`
   - **Pagination Pattern**: Query parameter `?page=2`
   - **Products Per Page**: 24
   - **Verified**: Yes, tested pagination through 3 pages
   - **Edge Cases**: Last page has fewer products (handled with conditional)
   - **Sample Detail URLs**: [List 3-5 URLs for detail parser]
   
   ## Vars Flow
   
   ### Categories → Listings/Subcategories
   - `category_name`: Name of the category
   - `category_level`: Hierarchy level (1, 2, 3...)
   - `breadcrumb`: Full category path
   
   ### Subcategories → Listings
   - `subcategory_name`: Name of subcategory
   - `category_name`: Parent category name
   - `breadcrumb`: Full path including subcategory
   
   ### Listings → Details
   - `category_name`: Category name
   - `breadcrumb`: Full category path
   - `rank`: Product position in listing (1, 2, 3...)
   - `page_number`: Pagination page number
   - `listing_position`: Position within current page
   
   ## Selector Discovery Details
   
   ### Category Selectors
   - **Primary**: `.category-item a`
   - **Fallback**: `.nav-link a`
   - **Verification**: Tested on homepage and category pages
   - **Confidence**: 95%
   
   ### Pagination Selectors
   - **Next Button**: `.next-page`
   - **Fallback**: `a[aria-label="Next"]`
   - **Pattern**: Query parameter `?page=2`
   - **Verification**: Tested through 5 pages
   
   ## Next Steps for Detail Parser
   
   **Inputs Needed:**
   - Use sample detail URLs from `sample_detail_urls` array
   - Expect vars: `category_name`, `breadcrumb`, `rank`, `page_number`
   
   **Command to Run:**
   ```bash
   /create-details-parser scraper=<scraper_slug>
   ```
   
   This will read navigation-selectors.json and navigation-knowledge.md
   to understand page flow and vars.
   ```

=== STEP 8: Update Phase Status ===
19) Update phase-status.json (USE ABSOLUTE PATH):
   ```json
   "navigation_discovery": {
     "status": "completed",
     "completed_at": "<timestamp>",
     "checkpoints": {
       "categories_analyzed": true,
       "categories_parser_generated": true,
       "subcategories_analyzed": true,
       "subcategories_parser_generated": true,
       "listings_analyzed": true,
       "listings_parser_generated": true
     }
   }
   ```

20) Update browser-context.json (USE ABSOLUTE PATH)

=== STEP 9: Completion Report ===
21) Display completion summary:
   ```
   ✅ Navigation Parsers Complete
   
   Scraper: <scraper_slug>
   
   Parsers Generated & Tested:
   - parsers/categories.rb ✅ (tested)
   - parsers/subcategories.rb ✅ (tested, if applicable)
   - parsers/listings.rb ✅ (tested)
   
   Files Created/Updated:
   - generated_scraper/<scraper>/config.yaml ✅ (updated with navigation parsers)
   - generated_scraper/<scraper>/.scraper-state/navigation-selectors.json ✅
   - generated_scraper/<scraper>/.scraper-state/navigation-knowledge.md ✅
   - generated_scraper/<scraper>/.scraper-state/phase-status.json ✅ (updated)
   
   Next Command:
   /create-details-parser scraper=<scraper_slug>
   
   This command will read navigation-selectors.json and navigation-knowledge.md
   to generate detail parser with proper vars flow.
   ```

**CRITICAL COMPLETION REQUIREMENTS:**
- ✅ All parsers generated (categories, subcategories if needed, listings)
- ✅ All parsers tested with parser_tester MCP tool
- ✅ config.yaml updated with navigation parsers
- ✅ navigation-selectors.json written (machine-readable)
- ✅ navigation-knowledge.md written (human + AI readable)
- ✅ phase-status.json updated
- ✅ Sample detail URLs extracted
- ✅ Completion report displayed with next steps

**This command is now COMPLETE and INDEPENDENT.**
**Next session can run /create-details-parser without any conversation history.**

Examples:
  /create-navigation-parser scraper=naivas_online
  /create-navigation-parser scraper=my_store resume-url="https://example.com/categories"
"""
