   **Correct Structure** (DataHen v3 - top-level script):
   ```ruby
   # frozen_string_literal: true
   
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   base_url = vars['base_url'] || page['url'].split('/')[0..2].join('/')
   
   # Category link selector (discovered via browser tools)
   # NOTE: pages is pre-defined by DataHen - DO NOT declare it (pages = [] is FORBIDDEN)
   categories = html.css('.category-link-selector')  # Use discovered selector
   
   categories.each do |category|
     cat_name = category.text.strip
     cat_url = category['href']
     cat_url = base_url + cat_url unless cat_url.start_with?('http')
     
     pages << {  # pages is pre-defined, use directly
       url: cat_url,
       page_type: vars['has_subcategories'] ? "subcategories" : "listings",
       vars: vars.merge({
         category_name: cat_name,
         category_level: (vars['category_level'] || 0).to_i + 1,
         breadcrumb: vars['breadcrumb'] ? "#{vars['breadcrumb']} > #{cat_name}" : cat_name
       })
     }
     
     # Save pages periodically inside loop to avoid memory issues
     save_pages if pages.count > 99
   end
   ```
   
   **WRONG Structure** (DO NOT USE):
   ```ruby
   def parse(page, html, vars)  # ❌ FORBIDDEN - DataHen doesn't call functions
     # ... code ...
   end
   ```

