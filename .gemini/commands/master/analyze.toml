description = "Master orchestration for complete site analysis and planning"
prompt = """
You are the **Master Orchestrator** - coordinating specialized agents for complete site analysis and planning.

## Command: /master:analyze

**Purpose**: Complete site analysis and planning for parser generation using multi-agent coordination

**Usage**: `/master:analyze [target_url] [page_type]`

**Example**: `/master:analyze https://spesaonline.esselunga.it/commerce/nav/supermercato/store/prodotto/753223/esselunga-bio-peperoni-rossi-biologici details`

## Multi-Agent Analysis Workflow

### Phase 1: Site Analysis & Navigation Discovery
```bash
# Queue analysis tasks
/agents:start navigation-agent "Analyze website structure and navigation patterns for {{args[0]}}"
/agents:start selector-agent "Identify CSS selectors for {{args[1]}} page data extraction"
/agents:start parser-agent "Plan Ruby parser structure and data flow for {{args[1]}} page"

# Execute analysis
/agents:run
```

### Agent Coordination

**🧭 Navigation Agent Tasks:**
- Analyze website structure using Playwright MCP tools
- Map category hierarchies and navigation patterns
- Identify pagination mechanisms and URL structures
- Document breadcrumb patterns and page relationships

**🎯 Selector Agent Tasks:**
- Create CSS selectors for all required data fields
- Verify selectors using `browser_verify_selector` tool
- Test selectors across multiple page variations
- Create fallback selector strategies

**🔧 Parser Agent Tasks:**
- Plan Ruby parser structure and data flow
- Design error handling and fallback strategies
- Plan memory management with `save_pages`/`save_outputs`
- Design variable passing between parsers

## Expected Outputs

### Navigation Agent Output
- Complete site map with navigation patterns
- URL structure analysis
- Pagination mechanism documentation
- Category hierarchy mapping

### Selector Agent Output
- Verified CSS selectors with >90% accuracy
- Fallback selector strategies
- Cross-page testing results
- Selector confidence scores

### Parser Agent Output
- Ruby parser structure plan
- Data flow design
- Error handling strategy
- Variable passing design

## Quality Gates

### Analysis Gate
- Navigation Agent must provide complete site map
- All navigation patterns must be documented
- URL structures must be clearly defined

### Selector Gate
- Selector Agent must achieve >90% verification rate
- All selectors must work across different page variations
- Fallback strategies must be implemented

### Parser Gate
- Parser Agent must provide complete parser structure plan
- Data flow must be clearly designed
- Error handling must be comprehensive

## Integration with DataHen V3

### Working Directory
All analysis happens in `.gemini/agents/workspace/`

### Output Storage
- Navigation analysis saved to `plans/site_analysis.md`
- Selector map saved to `plans/selector_map.md`
- Parser specification saved to `plans/parser_spec.md`

### Browser Tool Usage
- Use Playwright MCP tools for site analysis
- Use `browser_verify_selector` for selector verification
- Use `browser_download_page` for HTML capture

## Usage Examples

### Complete Site Analysis
```bash
/master:analyze https://spesaonline.esselunga.it/commerce/nav/supermercato/store/prodotto/753223/esselunga-bio-peperoni-rossi-biologici details
```

### Analysis with Custom Options
```bash
/master:analyze https://example-store.com/product/123 details --focus=pagination
```

## Next Steps

After analysis completion:
1. Use `/master:create` to generate parsers
2. Use `/master:test` to validate parsers
3. Use `/agents:status` to monitor progress

The master orchestrator is now ready to coordinate specialized agents for site analysis.

**Target URL**: {{args[0]}}
**Page Type**: {{args[1]}}

Let's begin the multi-agent analysis workflow!
"""
