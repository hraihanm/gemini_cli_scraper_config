=== STEP 4: Generate or Modify Detail Parser ===
🚨 **REMINDER**: You will write Ruby parser code here - that's the ONLY code you write. Use WriteFile tool to save it.

10) Generate or modify parsers/details.rb (USE ABSOLUTE PATH):
   **CRITICAL**: If parser exists, modify it instead of regenerating
   
   🚨 **CRITICAL: DataHen v3 Parser Structure**:
   - **DataHen parsers are TOP-LEVEL SCRIPTS, NOT FUNCTIONS**
   - **NEVER** use `def parse(...)` or any function definition
   - **NEVER** declare `pages = []` or `outputs = []` - these are pre-defined by DataHen
   - **NEVER** declare `page` or `content` - these are pre-defined and available at script level
   - **ALWAYS** start directly with `html = Nokogiri::HTML(content)` - no function wrapper
   - **ALWAYS** use reserved variables directly: `pages << {...}` and `outputs << {...}`
   - **VALIDATION**: Before writing code, scan for function definitions and reserved variable declarations and remove them
   
   **Why**: DataHen executes parser files as scripts directly. It does NOT call functions. The parser script has access to pre-defined variables (`content`, `page`, `pages`, `outputs`) at the top level.
   
   a) If parser exists:
      - Read existing parser code
      - **Check for reserved variable declarations** (pages = [], outputs = []) and remove them
      - Identify selector locations in code
      - Update broken selectors with newly discovered ones
      - Add missing fields from field-spec.json (if any)
      - Preserve existing logic (helper functions, navigation context, etc.)
      - Keep working parts, fix broken selectors
      - Maintain code structure and style
   
   b) If parser doesn't exist:
      - Read field-spec.json to determine which fields to extract
      - For each FIND field: Use discovered selectors from field-spec.json
      - For each PROCESS field: Implement computation logic from field-spec.json
      - **CRITICAL**: Define all field variables first, then build output_hash in one go
      - **Pattern**: Extract fields → Define variables → Build output_hash with all fields → Append to outputs
      - **CRITICAL**: Never declare reserved variables
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   
   # NOTE: pages and outputs are pre-defined by DataHen - DO NOT declare them (pages = [] or outputs = [] is FORBIDDEN)
   # NOTE: page and content are also pre-defined - use them directly
   
   # Navigation context integration:
   # This parser receives vars from listings parser:
   # - category_name: from categories/subcategories parser
   # - subcategory_name: from subcategories parser (if applicable)
   # - breadcrumb: hierarchical category path
   # - rank: product position in listing
   # - page_number: pagination page number
   # - listing_position: position within current page
   
   # Helper functions
   def text_of(element)
     element&.text&.strip
   end
   
   def number_from(text)
     text.to_s.gsub(/[^\\d.]/, '').to_f if text
   end
   
   def boolean_from(text)
     text.to_s.downcase.match?(/true|yes|available|in.?stock/i)
   end
   
   # Extract product fields using discovered selectors
   name = text_of(html.at_css('.product-name-selector')) || text_of(html.at_css('h1'))
   brand = text_of(html.at_css('.brand-selector'))
   sku = html.at_css('[data-product-id]')&.[]('data-product-id') || 
         text_of(html.at_css('.sku-selector'))
   
   # Price extraction
   customer_price_text = text_of(html.at_css('.customer-price-selector'))
   customer_price = number_from(customer_price_text)
   
   base_price_element = html.at_css('.base-price-selector')
   base_price_text = base_price_element&.text&.strip
   base_price = base_price_text ? number_from(base_price_text) : customer_price
   
   has_discount = base_price > 0 && customer_price < base_price
   discount_percentage = has_discount ? ((base_price - customer_price) / base_price * 100).round(2) : 0
   
   # Images
   img_url = html.at_css('.product-image img')&.[]('src') ||
             html.at_css('.main-image img')&.[]('src')
   
   # Description
   description = text_of(html.at_css('.description-selector')) ||
                 text_of(html.at_css('.product-description'))
   
   # Availability
   availability_text = text_of(html.at_css('.availability-selector'))
   is_available = boolean_from(availability_text)
   
   # Generate unique ID
   product_id = vars['competitor_product_id'] || 
                sku || 
                html.at_css('[data-product-id]')&.[]('data-product-id') ||
                Digest::MD5.hexdigest("#{name}#{page['url']}")
   
   # Define all field variables first (extracted, processed, and navigation context)
   # This makes the code cleaner and easier to maintain
   
   # Extracted fields (from FIND fields in field-spec.json or common fields)
   competitor_product_id = sku  # Using SKU as competitor_product_id
   customer_price_lc = customer_price
   base_price_lc = base_price
   
   # Processed fields (from PROCESS fields in field-spec.json)
   has_discount = customer_price_lc < base_price_lc
   discount_percentage = has_discount ? ((base_price_lc - customer_price_lc) / base_price_lc * 100).round(2) : 0
   
   # Navigation context (from vars passed by listings parser)
   category_name = vars['category_name']
   subcategory_name = vars['subcategory_name']  # If applicable
   breadcrumb = vars['breadcrumb']
   rank_in_listing = vars['rank']
   page_number = vars['page_number']
   
   # Build output hash with all fields defined above
   # Include all extracted fields, processed fields, and navigation context
   output_hash = {
     '_collection' => 'products',  # Use collection parameter or default
     '_id' => product_id,
     'url' => page['url'],
     'timestamp' => Time.parse(page['fetched_at']).strftime('%Y-%m-%d %H:%M:%S'),
     
     # Extracted fields
     'competitor_product_id' => competitor_product_id,
     'name' => name,
     'brand' => brand,
     'customer_price_lc' => customer_price_lc,
     'base_price_lc' => base_price_lc,
     'description' => description,
     'img_url' => img_url,
     'sku' => sku,
     'is_available' => is_available,
     
     # Processed fields
     'has_discount' => has_discount,
     'discount_percentage' => discount_percentage,
     
     # Navigation context
     'category_name' => category_name,
     'subcategory_name' => subcategory_name,
     'breadcrumb' => breadcrumb,
     'rank_in_listing' => rank_in_listing,
     'page_number' => page_number
   }
   
   outputs << output_hash  # outputs is pre-defined, use directly (outputs = [] is FORBIDDEN)
   
   # Save outputs periodically to avoid memory issues
   save_outputs if outputs.count > 99
   ```
   
   **Note**: The actual implementation should iterate through field-spec.json fields and extract/compute each one. This is a simplified example showing the pattern.

