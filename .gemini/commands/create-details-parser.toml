description = "Phase 3: Generate detail parser with navigation context. Reads navigation knowledge, writes detail knowledge, completes independently."

prompt = """
You are performing Phase 3: Detail Parser Generation. This command is COMPLETELY INDEPENDENT - it reads navigation state files, generates detail parser, writes ALL findings, and completes. No conversation history needed.

🚨 MODULAR DESIGN PRINCIPLES:
1. **Read State Files First** - Load navigation-selectors.json, navigation-knowledge.md, discovery-knowledge.md
2. **Write ALL Findings** - Before completion, write everything discovered
3. **Write Knowledge Files** - Human-readable + AI-readable summaries
4. **Self-Contained** - All needed info from state files
5. **Clear Completion** - Report what's done, what's next

🚨 CRITICAL - ABSOLUTE PATHS REQUIRED:
- **ALL WriteFile operations MUST use ABSOLUTE PATHS** - Relative paths will fail
- Before writing any file, convert relative path to absolute:
  * Determine workspace root (current working directory)
  * Convert: `generated_scraper/<scraper>/.scraper-state/file.json`
  * To absolute: `<workspace_root>/generated_scraper/<scraper>/.scraper-state/file.json`
- Use absolute paths for: detail-selectors.json, detail-knowledge.md, phase-status.json, parsers/details.rb

Inputs (order-agnostic via {{args}}):
  - scraper=<scraper_name> (REQUIRED - scraper must exist with navigation-selectors.json)
  - url=<details_page_url> (OPTIONAL - uses sample URL from navigation-selectors.json if not provided)
  - spec=<path-to-CSV-or-JSON> (OPTIONAL - field specification, e.g., spec_general_sample.csv)
    * If provided: Parse and update field-spec.json (overrides existing if any)
    * If not provided: Use existing field-spec.json from scrape-site (if exists)
    * If neither exists: Discover common fields (name, price, brand, etc.)
  - collection=<collection_name> (OPTIONAL, default: "products")
  - resume-url=<url> (OPTIONAL - resume browser from this URL)
  - out=<base_dir> (OPTIONAL - defaults to ./generated_scraper)

Process:

=== STEP 1: Load State Files ===
**CRITICAL**: Use ReadManyFiles to load state files (ReadFile fails due to ignore patterns)

1) Load all required state files using ReadManyFiles:
   ```javascript
   ReadManyFiles({
     patterns: [
       "generated_scraper/<scraper>/.scraper-state/phase-status.json",
       "generated_scraper/<scraper>/.scraper-state/navigation-selectors.json",
       "generated_scraper/<scraper>/.scraper-state/navigation-knowledge.md",
       "generated_scraper/<scraper>/.scraper-state/discovery-knowledge.md",
       "generated_scraper/<scraper>/.scraper-state/discovery-state.json",
       "generated_scraper/<scraper>/.scraper-state/field-spec.json",
       "generated_scraper/<scraper>/.scraper-state/detail-selectors.json",
       "generated_scraper/<scraper>/.scraper-state/detail-knowledge.md"
     ],
     target_directory: "<workspace_root>"
   })
   ```

2) Parse loaded files:
   - **phase-status.json**: Check detail_discovery.status
     * If "completed": Display summary, suggest next steps (testing/deployment)
     * If "in_progress": Resume from checkpoint
     * Else: Start fresh detail discovery
   - **field-spec.json**: **CRITICAL** - Field specification guide
     * If `spec` parameter provided: Parse spec file and create/update field-spec.json
     * If `spec` parameter not provided but field-spec.json exists: Use existing spec
     * If neither exists: Discover common fields (name, price, brand, etc.)
     * Extract: field names, types, extraction_method (FIND/PROCESS), notes
     * For FIND fields: Discover selectors for each field
     * For PROCESS fields: Document computation logic
   - **navigation-selectors.json**: Extract navigation context
     * Vars flow: categories → listings → details
     * Expected vars: `category_name`, `breadcrumb`, `rank`, `page_number`
     * Sample detail URLs from `listings.sample_detail_urls`
   - **navigation-knowledge.md**: Read for vars flow understanding
   - **discovery-knowledge.md**: Read for site structure context
   - **discovery-state.json**: Read for site structure if needed
   - **detail-selectors.json**: If exists, check what's already discovered
   - **detail-knowledge.md**: If exists, read previous discoveries

3) Handle field specification:
   - If `spec` parameter provided: Parse spec file (CSV or JSON) and create/update field-spec.json
   - If `spec` parameter not provided: Check for existing field-spec.json
   - If field-spec.json exists: Use it to guide field discovery
   - If field-spec.json missing: Discover common fields (fallback mode)

4) Validate prerequisites:
   - **REQUIRED**: navigation-selectors.json must exist (run `/create-navigation-parser` first if missing)
   - If missing: Display error: "Navigation parsers not found. Run: /create-navigation-parser scraper=<scraper>"
   - If exists: Continue with detail parser generation

5) Check for existing detail parser and test it:
   **CRITICAL**: Before generating new parser, check if parser already exists and test it
   
   a) Check if `parsers/details.rb` exists:
      - If exists: Read parser code
      - Test parser using parser_tester MCP tool:
        ```javascript
        parser_tester({
          scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
          parser_path: "parsers/details.rb",
          page_type: "details",
          html_file: "<absolute_path>/cache/product-page.html",
          // OR: auto_download: true
          vars: '{"category_name":"Electronics","breadcrumb":"Electronics","rank":1,"page_number":1}',
          quiet: false
        })
        ```
   
   b) Analyze test results:
      - **If test passes**: 
        * Parser is working correctly
        * Option 1: Skip generation (parser already good)
        * Option 2: Enhance with additional fields from field-spec.json
        * Option 3: Verify selectors still work, then continue
      - **If test fails**:
        * Analyze failure reason (selectors broken? missing fields?)
        * Discover new/updated selectors
        * Modify existing parser (don't regenerate from scratch)
        * Preserve working parts, fix broken selectors
      - **If parser doesn't exist**:
        * Continue with normal discovery and generation workflow
   
   c) Decision logic:
      - **Parser exists AND test passes**: Can enhance or skip
      - **Parser exists AND test fails**: Modify parser with new selectors
      - **Parser doesn't exist**: Generate new parser

**Note**: ReadManyFiles will return empty/not found for missing files - handle gracefully.

=== STEP 2: Determine Detail URL ===
6) Priority order for detail URL:
   - resume-url parameter (if provided)
   - url parameter (if provided)
   - navigation-selectors.json['listings']['sample_detail_urls'][0]
   - discovery-state.json['sample_urls']['detail']
   - Must ask user if none available

=== STEP 3: Selector Discovery ===
7) Navigate to detail page (if parser doesn't exist or test failed):
   - browser_navigate(detail_url)
   - browser_snapshot()

8) Discover selectors for each field (browser-first workflow):
   **CRITICAL**: If parser exists, focus on updating broken selectors or adding missing fields
   **CRITICAL**: Use field-spec.json to guide discovery (if available)
   
   a) Determine fields to discover:
      - If field-spec.json exists: Only discover fields marked as "FIND" in spec
      - If field-spec.json missing: Discover common fields (name, brand, price, etc.)
      - Skip fields marked as "PROCESS" (they're computed, not extracted)
   
   b) For each FIND field, discover selectors:
      - Use browser_inspect_element() to reveal real CSS selectors
      - Use browser_verify_selector() for text fields (names, prices, labels)
      - Use browser_evaluate() for non-text attributes (img src, data-*)
      - Fallback to browser_view_html() only if targeted inspection fails
   
   c) Field discovery priority (if field-spec.json exists):
      - Follow order in field-spec.json
      - Focus on fields marked as "FIND"
      - Document selectors in field-spec.json structure
   
   d) Common fields to discover (if no spec):
      * Product name
      * Brand
      * SKU / Product ID
      * Customer price
      * Base price (if discounted)
      * Description
      * Images (primary and secondary)
      * Availability status

9) Create Selector Plan and update field-spec.json:
   a) For each discovered field, update field-spec.json:
      ```json
      {
        "name": "competitor_product_id",
        "type": "str",
        "extraction_method": "FIND",
        "notes": "Find the product-id if possible or else use sku or barcode",
        "selectors": [".product-id", "[data-product-id]"],
        "verified": true,
        "confidence": 0.95,
        "extraction_notes": "Product ID found in data-product-id attribute"
      }
      ```
   
   b) Document selector discovery results:
      - Add `selectors` array to each FIND field
      - Add `verified: true` after browser verification
      - Add `confidence` score (0.0-1.0)
      - Add `extraction_notes` with selector details
   
   c) For PROCESS fields, document computation:
      ```json
      {
        "name": "has_discount",
        "type": "boolean",
        "extraction_method": "PROCESS",
        "notes": "true if it has discount",
        "computation": "customer_price_lc < base_price_lc",
        "verified": true
      }
      ```
   
   d) Save updated field-spec.json (USE ABSOLUTE PATH):
      - Path: `generated_scraper/<scraper>/.scraper-state/field-spec.json`
      - This now contains discovered selectors for all FIND fields

=== STEP 4: Generate or Modify Detail Parser ===
10) Generate or modify parsers/details.rb (USE ABSOLUTE PATH):
   **CRITICAL**: If parser exists, modify it instead of regenerating
   
   🚨 **FORBIDDEN: Reserved Variables**:
   - **NEVER** declare `pages = []` or `outputs = []` - these are pre-defined by DataHen
   - **NEVER** declare `page` or `content` - these are pre-defined
   - **ALWAYS** use reserved variables directly: `pages << {...}` and `outputs << {...}`
   - **VALIDATION**: Before writing code, scan for reserved variable declarations and remove them
   
   a) If parser exists:
      - Read existing parser code
      - **Check for reserved variable declarations** (pages = [], outputs = []) and remove them
      - Identify selector locations in code
      - Update broken selectors with newly discovered ones
      - Add missing fields from field-spec.json (if any)
      - Preserve existing logic (helper functions, navigation context, etc.)
      - Keep working parts, fix broken selectors
      - Maintain code structure and style
   
   b) If parser doesn't exist:
      - Read field-spec.json to determine which fields to extract
      - For each FIND field: Use discovered selectors from field-spec.json
      - For each PROCESS field: Implement computation logic from field-spec.json
      - Generate outputs array matching field-spec.json structure
      - **CRITICAL**: Never declare reserved variables
   ```ruby
   html = Nokogiri::HTML(content)
   vars = page['vars'] || {}
   
   # NOTE: pages and outputs are pre-defined by DataHen - DO NOT declare them (pages = [] or outputs = [] is FORBIDDEN)
   # NOTE: page and content are also pre-defined - use them directly
   
   # Navigation context integration:
   # This parser receives vars from listings parser:
   # - category_name: from categories/subcategories parser
   # - subcategory_name: from subcategories parser (if applicable)
   # - breadcrumb: hierarchical category path
   # - rank: product position in listing
   # - page_number: pagination page number
   # - listing_position: position within current page
   
   # Helper functions
   def text_of(element)
     element&.text&.strip
   end
   
   def number_from(text)
     text.to_s.gsub(/[^\\d.]/, '').to_f if text
   end
   
   def boolean_from(text)
     text.to_s.downcase.match?(/true|yes|available|in.?stock/i)
   end
   
   # Extract product fields using discovered selectors
   name = text_of(html.at_css('.product-name-selector')) || text_of(html.at_css('h1'))
   brand = text_of(html.at_css('.brand-selector'))
   sku = html.at_css('[data-product-id]')&.[]('data-product-id') || 
         text_of(html.at_css('.sku-selector'))
   
   # Price extraction
   customer_price_text = text_of(html.at_css('.customer-price-selector'))
   customer_price = number_from(customer_price_text)
   
   base_price_element = html.at_css('.base-price-selector')
   base_price_text = base_price_element&.text&.strip
   base_price = base_price_text ? number_from(base_price_text) : customer_price
   
   has_discount = base_price > 0 && customer_price < base_price
   discount_percentage = has_discount ? ((base_price - customer_price) / base_price * 100).round(2) : 0
   
   # Images
   img_url = html.at_css('.product-image img')&.[]('src') ||
             html.at_css('.main-image img')&.[]('src')
   
   # Description
   description = text_of(html.at_css('.description-selector')) ||
                 text_of(html.at_css('.product-description'))
   
   # Availability
   availability_text = text_of(html.at_css('.availability-selector'))
   is_available = boolean_from(availability_text)
   
   # Generate unique ID
   product_id = vars['competitor_product_id'] || 
                sku || 
                html.at_css('[data-product-id]')&.[]('data-product-id') ||
                Digest::MD5.hexdigest("#{name}#{page['url']}")
   
   # Build output based on field-spec.json
   # If field-spec.json exists, only include fields from spec
   # If field-spec.json missing, include common fields
   
   output_hash = {
     '_collection' => '#{collection}',  # Use collection parameter
     '_id' => product_id
   }
   
   # Add fields from field-spec.json (if exists) or common fields
   # For FIND fields: Extract using discovered selectors
   # For PROCESS fields: Compute using logic from spec
   
   # Example: If field-spec.json has "name" field marked as FIND
   if field_spec_exists && field_spec['fields'].any? { |f| f['name'] == 'name' && f['extraction_method'] == 'FIND' }
     output_hash['name'] = name  # Use discovered selector
   end
   
   # Example: If field-spec.json has "has_discount" marked as PROCESS
   if field_spec_exists && field_spec['fields'].any? { |f| f['name'] == 'has_discount' && f['extraction_method'] == 'PROCESS' }
     output_hash['has_discount'] = customer_price < base_price  # Compute
   end
   
   # Always include navigation context (from vars)
   output_hash['category_name'] = vars['category_name']
   output_hash['breadcrumb'] = vars['breadcrumb']
   output_hash['rank_in_listing'] = vars['rank']
   output_hash['page_number'] = vars['page_number']
   
   outputs << output_hash  # outputs is pre-defined, use directly (outputs = [] is FORBIDDEN)
   save_outputs if outputs.count > 99
   ```
   
   **Note**: The actual implementation should iterate through field-spec.json fields and extract/compute each one. This is a simplified example showing the pattern.

=== STEP 5: Test Detail Parser ===
**MANDATORY**: Test parser immediately after generation/modification

11) Test Detail Parser (or re-test if modified):
   a) Download HTML for testing:
      - Use browser_navigate() to visit detail URL (already navigated)
      - Use browser_view_html() to get HTML content
      - Save HTML to cache/ directory (or use auto_download in parser_tester)
   
   b) Test with parser_tester MCP tool:
      ```javascript
      parser_tester({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        parser_path: "parsers/details.rb",
        page_type: "details",
        html_file: "<absolute_path>/cache/product-page.html",
        // OR: auto_download: true  // Downloads from active browser tab
        vars: '{"category_name":"Electronics","breadcrumb":"Electronics","rank":1,"page_number":1}',
        quiet: false  // Show verbose output for testing
      })
      ```
   
   c) Validate test results:
      - Parser should output product data with all fields
      - Check that navigation vars (category_name, breadcrumb, rank) are included
      - Verify price extraction (customer_price, base_price logic)
      - Check product ID generation (_id field)
      - If test fails: Analyze errors, refine selectors, re-test
      - If test passes: Continue

=== STEP 6: Write Detail Selectors (JSON) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

12) Save detail-selectors.json (USE ABSOLUTE PATH):
   ```json
   {
     "product_fields": {
       "name": {
         "selectors": [".product-title", "h1"],
         "verified": true,
         "confidence": 0.95,
         "notes": "Product name in h1 tag"
       },
       "customer_price": {
         "selectors": ["p.my-0.leading-none.flex.flex-col.md\\:flex-row.pb-0 > span.font-bold.text-naivas-green"],
         "verified": true,
         "confidence": 0.95,
         "notes": "Price span inside p tag"
       },
       "base_price": {
         "selectors": ["p.text-naivas-red.line-through"],
         "verified": true,
         "confidence": 0.90,
         "notes": "Only present when product has discount",
         "fallback_logic": "If not found, base_price = customer_price"
       }
     },
     "navigation_integration": {
       "vars_received": ["category_name", "breadcrumb", "rank", "page_number"],
       "integration_status": "complete"
     }
   }
   ```

=== STEP 7: Update Config.yaml ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

13) Update config.yaml to add details parser and exporter fields (USE ABSOLUTE PATH):
   a) Read existing config.yaml (from generated_scraper/<scraper>/config.yaml)
   b) Parse YAML structure
   c) Append details parser to existing parsers array:
      ```yaml
      - page_type: details
        file: ./parsers/details.rb
        disabled: false
      ```
   d) Add CSV exporter with fields from field-spec.json (if exists):
      ```yaml
      exporters:
        - exporter_name: products_csv
          exporter_type: csv
          collection: products
          start_on_job_done: true
          fields:
            # Generate from field-spec.json
            - header: "competitor_product_id"
              path: "competitor_product_id"
              disable_scientific_notation: true
            - header: "name"
              path: "name"
              disable_scientific_notation: true
            # ... one entry per field in field-spec.json
      ```
   e) Write updated config.yaml (preserve seeder and navigation parsers, add details parser and exporter)
   
   **Note**: 
   - Keep existing seeder and navigation parsers
   - Append details parser to parsers array
   - Generate exporter fields from field-spec.json (if exists) or use common fields

=== STEP 8: Write Detail Knowledge (Markdown) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

14) Save detail-knowledge.md (USE ABSOLUTE PATH):
   ```markdown
   # Detail Parser Knowledge - <scraper_name>
   
   **Completed**: <timestamp>
   **Phase**: Detail Discovery
   
   ## Parser Generated
   
   ### Details Parser (parsers/details.rb)
   - **Status**: ✅ Complete
   - **Collection**: products
   - **Product ID Source**: SKU from data-product-id attribute
   
   ## Field Discoveries
   
   ### Product Name
   - **Selector**: `.product-title` (primary), `h1` (fallback)
   - **Verified**: Yes, tested on 3 products
   - **Confidence**: 95%
   - **Notes**: Always present, reliable selector
   
   ### Customer Price
   - **Selector**: `p.my-0.leading-none.flex.flex-col.md\\:flex-row.pb-0 > span.font-bold.text-naivas-green`
   - **Verified**: Yes, tested on 5 products
   - **Confidence**: 95%
   - **Notes**: Price span inside p tag with specific classes
   
   ### Base Price
   - **Selector**: `p.text-naivas-red.line-through` (when discounted)
