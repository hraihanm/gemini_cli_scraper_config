description = "End-to-end: visit URL, discover selectors, scaffold scraper, generate details.rb with navigation context, then run parser_tester."

prompt = """
Perform a single end-to-end pipeline. Do NOT generate a dummy parser without visiting the URL. Use the browser-first workflow from GEMINI.md to discover selectors, then scaffold and test.

This enhanced version integrates with navigation parsers - reads navigation-selectors.json to understand page flow and incorporates vars from listings parser.

Inputs (order-agnostic via {{args}}):
  - name=<scraper_name> | --scraper <scraper_name>
  - out=<base_dir> (default: ./generated_scraper)
  - collection=<collection_name> (default: products)
  - spec=<path-to-CSV-or-JSON> OR inline JSON after spec=
  - url=<details_page_url> (REQUIRED unless html= or navigation-state provided; url is still recommended for exploration)
  - html=<path-to-local-html-file> (optional; prefer for parser_tester if available)
  - resume-url=<url> (OPTIONAL - resume browser from this URL, overrides state file)
  - navigation-state=<path> (OPTIONAL - defaults to generated_scraper/<scraper>/.scraper-state/navigation-selectors.json)
  - browser-context=<path> (OPTIONAL - defaults to generated_scraper/<scraper>/.scraper-state/browser-context.json)

Spec parsing:
  - CSV: header row provides field names (like spec_general_sample.csv). Use first column as field ids.
  - JSON: accept ["field", ...], or { fields: [...] }, or array of objects (use keys).
  - Normalize fields to snake_case. Recognize common fields (name, brand, category, sub_category, description, sku, img_url, url, customer_price_lc, base_price_lc, has_discount, discount_percentage, is_available, competitor_product_id, etc.).

Context Loading (Before Pipeline):
  0) Load navigation context (if available):
     - Check for navigation-state file (default: generated_scraper/<scraper>/.scraper-state/navigation-selectors.json)
     - If exists, load navigation-selectors.json to understand:
       * Page flow: categories → subcategories → listings → details
       * Sample detail URLs (use first if url not provided)
       * Expected vars from listings parser (category_name, breadcrumb, rank, page_number)
     - Load browser-context.json for browser resume (if available)
     - Load phase-status.json to check if detail_discovery already completed

Pipeline:
  1) Determine Detail URL:
     Priority order:
     - resume-url parameter (if provided)
     - url parameter (if provided)
     - navigation-state['listings']['sample_detail_urls'][0] (from navigation discovery)
     - browser-context['last_url_visited'] (if it's a detail page)
     - Must ask user if none available

  2) Explore (browser-first):
     - browser_navigate(detail_url) → browser_snapshot
     - Use browser_inspect_element to reveal real CSS selectors for key fields
     - Use browser_verify_selector for text fields only (names, prices, labels)
     - Use browser_evaluate for non-text attributes (img src, data-*). Do NOT use verify_selector for images
     - Fallback to browser_view_html only if targeted inspection fails repeatedly (high token usage)
     - Produce a concise Selector Plan (field → ranked selectors, notes)

  3) Implement:
     - Create directories and files at <base_dir>/<scraper_slug>/ (if not exists):
         - config.yaml (update if exists)
         - seeder/seeder.rb (update if exists, preserve navigation seeders)
         - parsers/details.rb (create/update)
     - Parsers/details.rb - Enhanced with navigation context:
       ```ruby
       html = Nokogiri::HTML(content)
       vars = page['vars'] || {}
       
       # Navigation context integration:
       # This parser receives vars from listings parser:
       # - category_name: from categories/subcategories parser
       # - subcategory_name: from subcategories parser (if applicable)
       # - breadcrumb: hierarchical category path
       # - rank: product position in listing
       # - page_number: pagination page number
       # - listing_position: position within current page
       
       # Extract product fields using discovered selectors
       # Use selector arrays with fallbacks as discovered in exploration
       
       # Helper functions (if needed)
       def text_of(element)
         element&.text&.strip
       end
       
      def number_from(text)
        text.to_s.gsub(/[^\\d.]/, '').to_f if text
      end
       
       def boolean_from(text)
         text.to_s.downcase.match?(/true|yes|available|in.?stock/i)
       end
       
       # Extract product data
       name = text_of(html.at_css('.product-name-selector')) || text_of(html.at_css('h1'))
       # ... extract all fields using discovered selectors ...
       
       # Normalize prices
       customer_price = number_from(customer_price_text)
       base_price = number_from(base_price_text)
       has_discount = base_price > 0 && customer_price < base_price
       discount_percentage = has_discount ? ((base_price - customer_price) / base_price * 100).round(2) : 0
       
       # Generate unique ID
       product_id = vars['competitor_product_id'] || 
                    sku || 
                    html.at_css('[data-product-id]')&.[]('data-product-id') ||
                    Digest::MD5.hexdigest("#{name}#{page['url']}")
       
       # Build output with navigation context
       outputs << {
         '_collection' => '#{collection}',  # Use collection parameter
         '_id' => product_id,
         
         # Core product fields
         'name' => name,
         'brand' => brand,
         'sku' => sku,
         'description' => description,
         'img_url' => img_url,
         'url' => page['url'],
         
         # Pricing
         'customer_price_lc' => customer_price,
         'base_price_lc' => base_price,
         'has_discount' => has_discount,
         'discount_percentage' => discount_percentage,
         
         # Availability
         'is_available' => is_available,
         
         # Navigation context (from vars passed by listings parser)
         'category_name' => vars['category_name'],
         'subcategory_name' => vars['subcategory_name'],
         'breadcrumb' => vars['breadcrumb'],
         'rank_in_listing' => vars['rank'],
         'page_number' => vars['page_number'],
         'listing_position' => vars['listing_position'],
         
         # Additional metadata
         'competitor_product_id' => competitor_product_id,
         'store_name' => vars['store_name'],
         'country' => vars['country'],
         'currency' => vars['currency']
       }
       ```
     - Seeder: Only update if this is standalone (no navigation parsers exist). If navigation parsers exist, preserve existing seeder structure.
     - config.yaml: Update to include details parser (preserve navigation parsers if they exist)

  4) Update State Files:
     - Write detail-selectors.json:
       ```json
       {
         "product_fields": {
           "name": {
             "selectors": [".product-title", "h1"],
             "verified": true,
             "confidence": 0.95
           },
           "price": {
             "selectors": [".price", ".product-price"],
             "verified": true
           },
           // ... all fields
         },
         "navigation_integration": {
           "vars_received": ["category_name", "breadcrumb", "rank", "page_number"],
           "integration_status": "complete"
         }
       }
       ```
     - Update phase-status.json:
       ```json
       "detail_discovery": {
         "status": "completed",
         "completed_at": "<timestamp>",
         "parser_file": "parsers/details.rb",
         "collection_name": "<collection>"
       }
       ```
     - Update browser-context.json:
       ```json
       {
         "last_url_visited": "<detail_url>",
         "last_phase": "detail_discovery",
         "last_activity": "<timestamp>"
       }
       ```

  5) Test:
     - Prepare and execute parser_tester with:
         scraper_dir=<base_dir>/<scraper_slug> (ABSOLUTE PATH REQUIRED)
         parser_path=parsers/details.rb
         page_type=details
         quiet=false (for testing - show verbose output)
         vars='{"category_name":"Electronics","rank":1,"page_number":1}' (include navigation vars for realistic test)
         html_file=<html> (if provided) else url=<url> (ONLY if html_file not provided)
     - If the environment asks for confirmation, present it to the user; run once. If it fails, analyze errors, refine selectors minimally, and re-run one time.
     - Verify that navigation vars (category_name, breadcrumb) are properly included in output

Output expectations:
  - Show navigation context loaded (if available)
  - Show the Selector Plan (concise table)
  - Print the file tree of created/updated files
  - Show navigation vars integration (vars received from listings parser)
  - Show the parser_tester command and a short result summary
  - Confirm detail-selectors.json created
  - Confirm phase-status.json updated

Navigation Integration Notes:
  - If navigation-state exists, the detail parser will automatically receive vars from listings parser
  - Vars flow: categories → subcategories → listings → details
  - Detail parser should preserve and output all navigation context vars
  - This ensures complete product data with full category hierarchy

Examples:
  # Standalone usage (no navigation context)
  /create-details-parser name=shopper spec="spec_general_sample.csv" url="https://example.com/p/123"
  
  # With navigation context (recommended)
  /create-details-parser --scraper my_store url="https://example.com/p/123"
  # (Automatically loads navigation-selectors.json if exists)
  
  # Resume from browser state
  /create-details-parser scraper=shop resume-url="https://shop.com/product/456"
  
  # With explicit navigation state
  /create-details-parser scraper=store navigation-state="./generated_scraper/store/.scraper-state/navigation-selectors.json" url="https://store.com/p/789"
"""


