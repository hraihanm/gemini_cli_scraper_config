## User brief
The same turn must include **source URLs**, **caveats** (e.g. keyword-only search, master list), **required/recommended fields**, and **types**. If `spec=` is omitted, derive `field-spec.json` from this brief per `greenfield-prompt-spec.md`.

## Parse args
From {{args}} extract: `url=` (required), `name=` (required), `project=greenfield` (force if not set), optional `spec=`, `out=`, `auto_next=` (default false).

## Load profile and workflow
1. `read_file` → `profiles/greenfield.toml`.
2. From profile read `pipeline.phases[0].workflow` (authoritative).
3. `read_file` → that workflow file (`docs/workflows/phases/greenfield-01-site-discovery.md`).

## Execute
Follow that workflow **exactly**.

## Auto-chain
If `auto_next=true`: use `scripts/chain.ps1` / `scripts/chain.sh` per `docs/shared/agent-rules-gemini.md` with next `pipeline.phases[1].phase`, scraper name, and **`Project=greenfield`**.
