description = "Greenfield Phase 1: prompt-driven site discovery (no retail template). Usage: /greenfield-scrape url=<url> name=<slug> [spec=<csv|json>] [out=<dir>] [auto_next=true] — paste schema/caveats in the same prompt."

prompt = """
Greenfield site discovery — **`project=greenfield`** (prompt-driven sources: registries, search portals, directories).

Firmware: `.gemini/system.md`.

@{docs/shared/agent-rules-gemini.md}
@{docs/shared/datahen-conventions.md}
