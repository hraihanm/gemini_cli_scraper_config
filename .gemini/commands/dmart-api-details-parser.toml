10) Edit parsers/details.rb (USE ABSOLUTE PATH):

    **API Detail Parser code pattern** (fetch_type: "standard" required):
    ```ruby
    # API-based detail parser
    # content = raw JSON from API (fetch_type: standard — browser returns XML/HTML, not raw JSON)
    require './lib/headers'
    require './lib/helpers'
    require './lib/regex'
    require 'json'

    # Read vars from listings parser
    vars = page['vars'] || {}
    category_name = vars['category_name'].to_s
    breadcrumb = vars['breadcrumb'].to_s
    rank_in_listing = vars['rank'] || vars['listing_position']
    page_number = vars['page_number'] || vars['page']
    product_id_from_vars = vars['product_id']

    # Parse JSON response (content is raw JSON from standard fetch)
    begin
      data = JSON.parse(content)
    rescue JSON::ParserError => e
      raise "Failed to parse API response as JSON: #{e.message}"
    end

    # Navigate to product data (adjust path based on API response structure)
    product = data.dig('data', 'product') || data.dig('data') || data

    # === FIND Fields (extracted from API JSON using dig for safe traversal) ===
    name = product.dig('name') || product.dig('title') || ''
    name = name.strip unless name.nil?

    competitor_product_id = product.dig('id')&.to_s || product.dig('productId')&.to_s || product_id_from_vars
    sku = product.dig('sku') || product.dig('productCode') || ''
    barcode = product.dig('barcode') || product.dig('ean') || product.dig('upc')

    # Pricing
    customer_price_raw = product.dig('price') || product.dig('pricing', 'salePrice') || product.dig('salePrice')
    customer_price_lc = number_from(customer_price_raw.to_s) rescue nil

    base_price_raw = product.dig('originalPrice') || product.dig('pricing', 'mrp') || product.dig('mrp')
    base_price_lc = number_from(base_price_raw.to_s) rescue nil
    base_price_lc = customer_price_lc if base_price_lc.nil? || base_price_lc == 0

    # Description
    description = product.dig('description') || product.dig('longDescription') || ''
    description = description.strip unless description.nil?

    # Brand
    brand = product.dig('brand', 'name') || product.dig('brandName') || product.dig('brand') || ''
    brand = brand.strip if brand.is_a?(String)

    # Images
    images = product.dig('images') || product.dig('media') || []
    img_url = if images.is_a?(Array) && images.length > 0
      img = images[0]
      img.is_a?(Hash) ? (img['url'] || img['src'] || img['original']) : img.to_s
    else
      product.dig('image') || product.dig('imageUrl') || ''
    end
    img_url_2 = if images.is_a?(Array) && images.length > 1
      img = images[1]
      img.is_a?(Hash) ? (img['url'] || img['src'] || img['original']) : img.to_s
    else
      nil
    end

    # Availability
    is_available_raw = product.dig('inStock') || product.dig('availability', 'inStock') || product.dig('available')
    is_available = case is_available_raw
      when true, 'true', 'in_stock', 'available', 'IN_STOCK' then true
      when false, 'false', 'out_of_stock', 'unavailable', 'OUT_OF_STOCK' then false
      else !is_available_raw.nil?
    end

    # Category from API or vars
    api_category = product.dig('category', 'name') || product.dig('categories', 0, 'name')
    category = api_category || category_name
    sub_category = product.dig('categories', 1, 'name') || nil
    category_id = product.dig('category', 'id')&.to_s || product.dig('categories', 0, 'id')&.to_s || nil

    # Country of origin
    country_of_origin = product.dig('countryOfOrigin') || product.dig('country_of_origin') || nil

    # === PROCESS Fields (computed from extracted values) ===
    has_discount = !base_price_lc.nil? && !customer_price_lc.nil? && base_price_lc > customer_price_lc
    discount_percentage = if has_discount && base_price_lc > 0
      ((base_price_lc - customer_price_lc) / base_price_lc * 100).round(7)
    else
      nil
    end

    # Measurements (extracted from product name using MeasurementExtractor)
    uom = MeasurementExtractor.extract_uom(name.to_s)
    size_std = uom && uom[:size] ? uom[:size].to_f : nil
    size_unit_std = uom && uom[:unit] ? uom[:unit].downcase : nil
    product_pieces = MeasurementExtractor.extract_pieces(name.to_s) || 1

    # === HARDCODED / INFER Fields (set correct values per site) ===
    competitor_name = 'PLACEHOLDER_COMPETITOR_NAME'   # e.g., 'ICA', 'Naivas'
    competitor_type = 'PLACEHOLDER_COMPETITOR_TYPE'   # e.g., 'local_store', 'dmart'
    store_name = nil    # hardcoded store name or nil
    store_id = nil      # hardcoded store id or nil
    country_iso = 'PLACEHOLDER_COUNTRY_ISO'   # 2-letter code, e.g., 'SE', 'KE'
    language = 'PLACEHOLDER_LANGUAGE'         # 3-letter code, e.g., 'SWE', 'ENG'
    currency_code_lc = product.dig('currency') || 'PLACEHOLDER_CURRENCY'  # e.g., 'SEK'

    # === Fields not available via API — initialize to nil ===
    is_private_label = nil   # DETERMINE: set if brand logic is known
    type_of_promotion = nil  # FIND: nil unless promotions API field exists
    promo_attributes = nil   # FIND: nil unless promotions API field exists
    item_attributes = nil    # FIND: nil unless item attributes API field exists
    item_identifiers = barcode ? JSON.generate({ 'barcode' => barcode.to_s }) : nil
    variants = nil           # FIND: nil unless variants API field exists
    allergens = nil          # FIND: nil unless allergens API field exists
    nutrition_facts = nil    # FIND: nil unless nutrition API field exists
    ingredients = nil        # FIND: nil unless ingredients API field exists
    dimensions = nil         # FIND: nil unless dimensions API field exists
    img_url_3 = if images.is_a?(Array) && images.length > 2
      img = images[2]; img.is_a?(Hash) ? (img['url'] || img['src']) : img.to_s
    end
    img_url_4 = if images.is_a?(Array) && images.length > 3
      img = images[3]; img.is_a?(Hash) ? (img['url'] || img['src']) : img.to_s
    end
    latitude = nil
    longitude = nil
    reviews = nil
    store_reviews = nil

    # === Output — ALL 53 fields from field-spec.json (nil if not available) ===
    outputs << {
      _collection: 'products',
      _id: competitor_product_id || Digest::MD5.hexdigest(name.to_s + customer_price_lc.to_s),
      competitor_name: competitor_name,
      competitor_type: competitor_type,
      store_name: store_name,
      store_id: store_id,
      country_iso: country_iso,
      language: language,
      currency_code_lc: currency_code_lc,
      scraped_at_timestamp: Time.parse(page['fetched_at']).strftime('%Y-%m-%d %H:%M:%S'),
      competitor_product_id: competitor_product_id,
      name: name,
      brand: brand,
      category_id: category_id,
      category: category,
      sub_category: sub_category,
      customer_price_lc: customer_price_lc,
      base_price_lc: base_price_lc,
      has_discount: has_discount,
      discount_percentage: discount_percentage,
      rank_in_listing: rank_in_listing,
      page_number: page_number,
      product_pieces: product_pieces,
      size_std: size_std,
      size_unit_std: size_unit_std,
      description: description,
      img_url: img_url,
      img_url_2: img_url_2,
      img_url_3: img_url_3,
      img_url_4: img_url_4,
      barcode: barcode,
      sku: sku,
      url: page['url'],
      is_available: is_available,
      crawled_source: 'WEB',
      is_promoted: has_discount,
      is_private_label: is_private_label,
      type_of_promotion: type_of_promotion,
      promo_attributes: promo_attributes,
      item_attributes: item_attributes,
      item_identifiers: item_identifiers,
      country_of_origin: country_of_origin,
      variants: variants,
      allergens: allergens,
      nutrition_facts: nutrition_facts,
      ingredients: ingredients,
      dimensions: dimensions,
      latitude: latitude,
      longitude: longitude,
      reviews: reviews,
      store_reviews: store_reviews
    }
    ```

