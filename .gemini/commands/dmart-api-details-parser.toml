You are performing Phase 3 (API Approach): Detail Parser Generation. This variant generates a details parser that extracts product fields from **JSON API responses** instead of HTML/CSS selectors.

🚨🚨🚨 **CRITICAL: YOU ARE IN GEMINI CLI - USE TOOLS DIRECTLY, NEVER GENERATE CODE** 🚨🚨🚨
- **USE TOOLS DIRECTLY** - Call `read_file`, `browser_navigate`, `browser_network_search`, `browser_network_download`, `browser_request`, `write_file` via tool calling
- **FORBIDDEN**: Never write Python scripts, JavaScript code, or any programming code
- **CODE EXAMPLES IN THIS PROMPT ARE FOR REFERENCE ONLY** - They show Ruby parser code patterns
- **IF YOU START WRITING CODE**: Stop immediately and use tools instead

🚨 **API DETAIL PARSER APPROACH** (key differences from HTML approach):
- **ALWAYS use `fetch_type: "standard"`** — Browser returns XML/HTML-wrapped content, not raw JSON. Standard fetch returns the exact API response.
- **Parser uses `JSON.parse(content)`** — content is raw JSON from direct HTTP fetch
- **Field extraction uses JSON hash traversal**: `data.dig('product', 'price')` instead of CSS selectors
- **All fields are mapped from JSON response paths** rather than CSS selectors
- **Discovery uses `browser_request`** to fetch individual product API responses and save to files
- **Testing uses `parser_tester` with `content_file`** parameter pointing to saved JSON files
- **Field mapping is more reliable** since API responses have consistent, structured JSON

🚨 **PRODUCTION PARSER PATTERN** (fetch_type: "standard" required):
```ruby
# content = raw JSON from direct HTTP fetch
json = JSON.parse(content)
product = json.dig('data', 'product') || json

outputs << {
  _collection: "products",
  _id: product['productId'] || product['id'].to_s,
  name: product.dig('name'),
  customer_price_lc: product.dig('price', 'current').to_f,
  base_price_lc: product.dig('price', 'original').to_f,
  brand: product.dig('brand', 'name'),
  description: product.dig('description'),
  sku: product.dig('sku'),
  img_url: product.dig('images', 0, 'url'),
  is_available: product.dig('availability', 'inStock'),
  # ... more fields from field-spec.json ...
}
```

🚨 **SAFE HASH TRAVERSAL WITH `dig`**:
- Use `data.dig('field', 'nested_field')` for safe navigation (returns nil if any key missing)
- Don't chain `[]` calls: `data['field']['nested']` will raise NoMethodError if `data['field']` is nil
- Examples:
  ```ruby
  name = product.dig('name') || product.dig('title') || ''
  price = product.dig('pricing', 'salePrice') || product.dig('price')
  brand = product.dig('brand', 'name') || product.dig('brandName')
  images = product.dig('media', 'images') || product.dig('images') || []
  img_url = images.is_a?(Array) && images.length > 0 ? (images[0].is_a?(Hash) ? images[0]['url'] : images[0].to_s) : nil
  ```

🚨 **CRITICAL: DataHen v3 Parser Structure**:
- **DataHen parsers are TOP-LEVEL SCRIPTS, NOT FUNCTIONS**
- **NEVER** use `def parse(...)` or any function definition
- **NEVER** declare `pages = []` or `outputs = []` - pre-defined by DataHen
- **ALWAYS** start directly with parsing logic
- **Pre-defined variables**: `content`, `page`, `pages`, `outputs`

🚨 CRITICAL - ABSOLUTE PATHS REQUIRED for all WriteFile operations

