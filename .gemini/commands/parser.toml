## Agent Coordination

### Navigation Agent (Site Analysis)
- **Role**: Website structure analysis and navigation pattern discovery
- **Tasks**: Site mapping, pagination detection, category navigation, URL pattern analysis
- **Tools**: Playwright MCP tools, browser automation, network request analysis

### Parser Agent (Ruby Development)
- **Role**: Ruby parser development and implementation
- **Tasks**: Parser creation, error handling, memory management, testing
- **Tools**: Ruby development, DataHen V3 framework, parser_tester MCP tool

### Selector Agent (CSS Optimization)
- **Role**: CSS selector analysis and verification
- **Tasks**: Selector creation, verification, cross-page testing, optimization
- **Tools**: Playwright MCP tools, browser automation, selector testing

## DataHen V3 Parser Standards

### Required Structure
```ruby
# Standard parser template
html = Nokogiri::HTML(content)
vars = page['vars']

# Extract data with error handling
begin
  product_name = html.at_css('.product-title')&.text&.strip
rescue => e
  puts "Error extracting product name: #{e.message}"
  product_name = nil
end

# Queue next pages
pages << {
  url: next_url,
  page_type: "next_page",
  vars: vars.merge({ extracted_field: product_name })
}

# Generate outputs
outputs << {
  '_collection' => 'products',
  '_id' => unique_id,
  'name' => product_name,
  'context' => vars['context']
}
```

### Error Handling Requirements
- **Rescue Clauses**: All CSS operations must have error handling
- **Fallback Values**: Provide meaningful fallback values
- **Logging**: Include descriptive error messages
- **Graceful Degradation**: Continue processing when elements are missing

### Memory Management
- **Batch Saving**: Use `save_pages` and `save_outputs` for large datasets
- **Array Limits**: Save when arrays exceed 99 items
- **Variable Preservation**: Maintain context throughout pipeline

## Testing Protocol

### Mandatory Testing Steps
1. **HTML Download**: Use browser tools to download test pages
2. **Parser Testing**: Use `parser_tester` MCP tool with HTML files
3. **Selector Verification**: Use `browser_verify_selector` for all selectors
4. **Cross-Page Testing**: Test on multiple similar pages
5. **Variable Testing**: Verify data flow between parsers

### Testing Commands
```javascript
// Test with downloaded HTML (MANDATORY)
parser_tester({
  scraper_dir: "D:\\DataHen\\projects\\playwright-mcp-mod\\generated_scraper\\[scraper_name]",
  parser_path: "parsers/details.rb",
  html_file: "D:\\DataHen\\projects\\playwright-mcp-mod\\cache\\product-page.html"
})

// Test with variables
