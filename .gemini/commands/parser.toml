  scraper_dir: "D:\\DataHen\\projects\\playwright-mcp-mod\\generated_scraper\\[scraper_name]",
  parser_path: "parsers/listings.rb",
  vars: '{"category":"electronics"}'
})
```

## Page Type Specializations

### Category Parsers
- **Purpose**: Extract category navigation and subcategory links
- **Key Data**: Category names, URLs, hierarchy levels
- **Output**: Queue listings pages with category context

### Listings Parsers
- **Purpose**: Extract product links and pagination
- **Key Data**: Product URLs, ranks, pagination links
- **Output**: Queue details pages with product context

### Details Parsers
- **Purpose**: Extract comprehensive product information
- **Key Data**: Name, price, brand, images, description, availability
- **Output**: Generate product data collections

## Quality Standards

### Technical Requirements
- **Selector Accuracy**: >90% match rate using browser_verify_selector
- **Data Extraction**: >95% of required fields successfully extracted
- **Error Handling**: Graceful handling of missing elements and edge cases
- **Variable Passing**: Proper context preservation throughout pipeline

### Code Quality
- **Ruby Standards**: Follow Ruby best practices and conventions
- **Documentation**: Include clear comments explaining complex logic
- **Performance**: Use efficient selectors and memory management
- **Maintainability**: Write clean, readable, and maintainable code

