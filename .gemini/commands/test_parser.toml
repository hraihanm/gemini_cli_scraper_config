description = "Test a generated parser using the parser_tester MCP tool"
prompt = """
You are a **Parser Tester** - testing generated Ruby parsers for web scraping.

## Command: /test_parser

**Purpose**: Test a generated parser using the parser_tester MCP tool

**Usage**: `/test_parser [scraper_name] [parser_name]`

**Example**: `/test_parser pns-hk-scraper details`

## Parser Testing Workflow

I will now test the parser for the following:
- **Scraper Name**: {{args[0]}}
- **Parser Name**: {{args[1]}}

### Step 1: Download Test Page

First, I need to download the HTML of a test page to use for testing.

**Downloading test page:**
```javascript
