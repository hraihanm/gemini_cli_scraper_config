parser_tester({
  scraper_dir: "D:\\DataHen\\projects\\gemini_cli_testbed\\generated_scraper\\{{args[0]}}",
  parser_path: "parsers/{{args[1]}}.rb",
  html_file: "D:\\DataHen\\projects\\gemini_cli_testbed\\{{args[1]}}_test_page.html"
})
```

### Step 3: Test Parser with Variables

I will also test the parser with different variables to ensure it handles various scenarios.

**Testing with variables:**
```javascript
