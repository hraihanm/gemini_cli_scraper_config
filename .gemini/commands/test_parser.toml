browser_download_page({
  url: "https://www.pns.hk/en/original-cat-dry-cat-food-1.8kg-orijen/p/BP_6600000223",
  filename: "{{args[1]}}_test_page.html"
})
```

### Step 2: Test Parser with HTML File

I will test the parser using the downloaded HTML file.

**Testing parser:**
```javascript
