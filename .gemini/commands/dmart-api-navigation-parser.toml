=== STEP 3: Categories Parser (API Version) ===
7) Edit parsers/categories.rb for API consumption (USE ABSOLUTE PATH):

   **Use `fetch_type: "standard"`** (required — browser returns XML/HTML, not raw JSON):
   ```ruby
   # API-based categories parser (fetch_type: standard)
   # content = raw JSON from direct HTTP fetch
   require './lib/headers'
   require 'json'

   cookie = page['response_cookie'] || page['vars']['cookie'] rescue nil

   begin
     data = JSON.parse(content)
   rescue JSON::ParserError => e
     raise "Failed to parse API response as JSON: #{e.message}"
   end

   # Navigate to categories in JSON response (adjust path from discovery-state)
   categories = data.dig('data', 'categories') || data.dig('categories') || []

   categories.each do |cat|
     category_name = cat['name'] || cat['title']
     category_id = cat['id'].to_s

     next if category_name.nil? || category_name.strip.empty?

     # Build API URL for this category's listings
     api_url = "#{URLs::API_BASE_URL}/categories/#{category_id}/products?page=1"

     pages << {
       url: api_url,
       page_type: 'listings',
       fetch_type: 'standard',
       headers: { 'Cookie' => cookie, 'Accept' => 'application/json' },
       cookie: cookie,
       vars: {
         cookie: cookie,
         category_name: category_name.strip,
         category_id: category_id,
         breadcrumb: category_name.strip,
         page: 1
       }
     }
   end
   ```

   a) Read existing categories.rb parser
