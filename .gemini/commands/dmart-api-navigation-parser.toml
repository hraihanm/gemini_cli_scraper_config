=== STEP 5: Listings Parser (API Version) ===
13) Edit parsers/listings.rb for API consumption (USE ABSOLUTE PATH):

    **Listings parser with upfront pagination (production pattern)**:
    ```ruby
    # API-based listings parser with queue-all-upfront pagination
    require './lib/headers'
    require 'json'

    cookie = page['vars']['cookie'] rescue page['response_cookie']
    category_name = page['vars']['category_name'] rescue ''
    category_id = page['vars']['category_id'] rescue ''
    breadcrumb = page['vars']['breadcrumb'] rescue ''
    current_page = (page['vars']['page'] || 1).to_i

    begin
      data = JSON.parse(content)
    rescue JSON::ParserError => e
      raise "Failed to parse API response as JSON: #{e.message}"
    end

    # Navigate to products in JSON response
    products = data.dig('data', 'products') || []
    total_count = data.dig('data', 'total') || data.dig('meta', 'total_count') || 0
    per_page = products.length

    # -----------------------------------------------------------------------
    # Pagination Strategy A: Offset / Page-Number (queue ALL pages upfront)
    # Use when: discovery-state.json pagination_type == "offset"
    # -----------------------------------------------------------------------
    if current_page == 1 && per_page > 0
      total_pages = (total_count.to_f / per_page).ceil
      (2..total_pages).each do |pg|
        api_url = "#{URLs::API_BASE_URL}/categories/#{category_id}/products?page=#{pg}"
        pages << {
          url: api_url,
          page_type: 'listings',
          fetch_type: 'standard',
          headers: { 'Cookie' => cookie, 'Accept' => 'application/json' },
          cookie: cookie,
          vars: {
            cookie: cookie,
            category_name: category_name,
            category_id: category_id,
            breadcrumb: breadcrumb,
            page: pg,
            seen_ids: seen_ids  # carry deduplication state across pages
          }
        }
      end
    end

    # -----------------------------------------------------------------------
    # Pagination Strategy B: Cursor-Based (chain pages one at a time)
    # Use when: discovery-state.json pagination_type == "cursor" (GraphQL / modern REST)
    # Pattern: pageInfo.hasNextPage + pageInfo.endCursor
    # Cannot queue all pages upfront — must follow cursor chain
    # -----------------------------------------------------------------------
    # next_cursor = data.dig('pageInfo', 'endCursor') ||
    #               data.dig('data', 'pageInfo', 'endCursor') ||
    #               data.dig('meta', 'nextCursor')
    # has_next = data.dig('pageInfo', 'hasNextPage') == true || !next_cursor.nil?
    #
    # if has_next && next_cursor
    #   # For GraphQL: POST with updated variables
    #   pages << {
    #     url: URLs::API_BASE_URL + '/graphql',
    #     page_type: 'listings',
    #     method: 'POST',
    #     fetch_type: 'standard',
    #     headers: { 'Content-Type' => 'application/json', 'Cookie' => cookie },
    #     body: { operationName: 'PLACEHOLDER_OPERATION',
    #             variables: { after: next_cursor, first: per_page, categoryId: category_id },
    #             query: 'PLACEHOLDER_GRAPHQL_QUERY' }.to_json,
    #     vars: vars.merge('cursor' => next_cursor, 'page' => current_page + 1)
    #   }
    #   # For REST cursor: GET with cursor param
    #   # pages << {
    #   #   url: "#{URLs::API_BASE_URL}/categories/#{category_id}/products?after=#{next_cursor}",
    #   #   page_type: 'listings', fetch_type: 'standard',
    #   #   headers: { 'Cookie' => cookie },
    #   #   vars: vars.merge('cursor' => next_cursor, 'page' => current_page + 1)
    #   # }
    # end

    # Deduplication guard — some APIs return overlapping products across pages
    # (common with cursor pagination and some offset-based APIs)
    seen_ids = (page['vars']['seen_ids'] || [])
    products = products.reject { |p| seen_ids.include?((p['id'] || p['sku']).to_s) }
    seen_ids += products.map { |p| (p['id'] || p['sku']).to_s }

    # Generate detail pages for each product
    products.each_with_index do |product, index|
      product_name = product['name'] || product['title']
      product_id = product['id'] || product['sku']
      rank = (current_page - 1) * per_page + index + 1

      # Build detail API URL
      detail_api_url = "#{URLs::API_BASE_URL}/products/#{product_id}"

      pages << {
        url: detail_api_url,
        page_type: 'details',
        fetch_type: 'standard',
        headers: { 'Cookie' => cookie, 'Accept' => 'application/json' },
        cookie: cookie,
        vars: {
          cookie: cookie,
          category_name: category_name,
          breadcrumb: breadcrumb,
          rank: rank,
          page_number: current_page,
          listing_position: index + 1,
          product_id: product_id.to_s
        }
      }
    end
    ```

    a) Read existing listings.rb parser
    b) Replace with API-based version using JSON paths from discovery-state.json
    c) Implement queue-all-upfront pagination pattern
    d) Include cookie passing logic
    e) Write updated parser (USE ABSOLUTE PATH)

