description = "Phase 1: Site discovery and boilerplate initialization. Generic — Usage: /scrape url=<url> name=<scraper> [project=dmart-dloc|dhero|...] [spec=<path>] [out=<dir>] [auto_next=true]"

prompt = """
Phase 1: Site Discovery. Session-independent — use state files and profile only.

Firmware rules: `.gemini/system.md` (loaded by CLI).

@{docs/shared/agent-rules-gemini.md}
@{docs/shared/datahen-conventions.md}

## Parse args
From {{args}} extract: `url=` (required), `name=` (required), `project=` (default `dmart-dloc`), `spec=`, `out=`, `auto_next=` (default false).

## Load profile and workflow
1. `read_file` → `profiles/<project>.toml` (resolve `<project>` from args).
2. From profile read `pipeline.phases[0]` — note `workflow` path (authoritative — do not assume a hardcoded path).
3. `read_file` → that workflow file.

## Execute
Follow the workflow document **exactly** (all STEPs). Apply template substitutions the workflow defines (`{output_dir}`, `{scraper}`, `{project}`, `<next_phase_from_profile>`, etc.).

## Auto-chain
If `auto_next=true`: close browser, then spawn next phase via **`run_terminal_cmd`** using repo **`scripts/chain.ps1`** (Windows) or **`scripts/chain.sh`** (Unix) with `-Phase`/args set to `pipeline.phases[1].phase`, scraper name, and project — see `docs/shared/agent-rules-gemini.md`. On failure, print the manual `gemini -y -i "/<phase> ..."` line.
"""
