   - details.rb fields present: X/53
   - Missing fields: [list, or "none"]
   - Wrong field names: [list, or "none"]
   - Nil fields correctly included: [yes/no]

   ## Recurring Patterns Across Sessions
   (only if multiple audit files exist)
   - Fields consistently hard to find: [list]
   - Errors that recur: [list]

   ## Recommendations (prioritized by impact)
   1. [Highest impact change with specific TOML edit]
   2. ...
   ```

8) Display summary of findings to user:
   - Show the improvement-report.md content
   - Highlight top 3 actionable recommendations

=== STEP 5: Completion ===
