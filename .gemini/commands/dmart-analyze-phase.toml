   Generated: <timestamp>
   Phases analyzed: <list>

   ## Tool Usage Summary
   | Tool | Total Calls | Unnecessary | Recommendation |
   |------|-------------|-------------|----------------|
   | browser_view_html | X | Y | ... |
   | browser_network_download | X | Y | ... |
   | browser_request | X | Y | ... |
   | parser_tester | X | â€” | ... |
   | datahen_run | X | â€” | ... |
   | browser_grep_html | X | â€” | (preferred) |
   | browser_network_search | X | â€” | (preferred) |

   ## Issues Found

   ### [Issue title â€” e.g. "browser_view_html called without trying browser_grep_html first"]
   - **Phase**: [phase name]
   - **Step**: [step description]
   - **Observation**: [what happened]
   - **Suggested TOML change**: [specific text to add or modify in the TOML]
   - **File**: [which .toml file to edit]

