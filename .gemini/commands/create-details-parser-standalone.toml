description = "End-to-end: visit URL, discover selectors, scaffold scraper, generate details.rb, then run parser_tester."

prompt = """
Perform a single end-to-end pipeline. Do NOT generate a dummy parser without visiting the URL. Use the browser-first workflow from GEMINI.md to discover selectors, then scaffold and test.

Inputs (order-agnostic via {{args}}):
  - name=<scraper_name> | --scraper <scraper_name>
  - out=<base_dir> (default: ./generated_scraper)
  - collection=<collection_name> (default: products)
  - spec=<path-to-CSV-or-JSON> OR inline JSON after spec=
  - url=<details_page_url> (REQUIRED unless html= is provided for testing; url is still recommended for exploration)
  - html=<path-to-local-html-file> (optional; prefer for parser_tester if available)

Spec parsing:
  - CSV: header row provides field names (like spec_general_sample.csv). Use first column as field ids.
  - JSON: accept ["field", ...], or { fields: [...] }, or array of objects (use keys).
  - Normalize fields to snake_case. Recognize common fields (name, brand, category, sub_category, description, sku, img_url, url, customer_price_lc, base_price_lc, has_discount, discount_percentage, is_available, competitor_product_id, etc.).

Pipeline:
  1) Explore (browser-first):
     - browser_navigate(url)
     
     **CRITICAL**: Handle cookies, notifications, and popups after navigation:
     - Use browser_screenshot() to visually inspect the page for popups/modals
     - Use browser_snapshot() to check for cookie banners, notification overlays, or popups
     - **Primary approach** (if popup detected in snapshot):
       * Use browser_click() with element ref or selector to interact:
         - Cookie banners: Click "Accept", "Accept All", or "I Agree" buttons
         - Notifications: Click "Later", "Not Now", or "Skip" buttons
         - Popups/modals: Click close button (X), "Close", or overlay to dismiss
       * Common selectors to check: `[id*="cookie"]`, `[class*="cookie"]`, `[id*="popup"]`, `[class*="modal"]`, `button:contains("Accept")`, `button:contains("Later")`
     - **Fallback approach** (if popup NOT in snapshot BUT visible in screenshot - invisible to accessibility tree):
       * Analyze screenshot to identify button location (AI vision analysis)
       * Extract coordinates (x, y) from button center region
       * Use browser_mouse_click_xy("Accept button", x, y) to click by coordinates
       * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
       * **Important**: Coordinate clicks are viewport-relative; click center of button region, not edge
     - **Verification**: After handling popups (selector-based OR coordinate-based), browser_snapshot() again to verify page is ready
     
     - browser_snapshot() → Get accessibility tree
     - Use browser_inspect_element to reveal real CSS selectors for key fields
     - Use browser_verify_selector for text fields only (names, prices, labels)
     - Use browser_evaluate for non-text attributes (img src, data-*). Do NOT use verify_selector for images
     - Fallback to browser_view_html only if targeted inspection fails repeatedly (high token usage)
     - Produce a concise Selector Plan (field → ranked selectors, notes)

  2) Implement:
     - Create directories and files at <base_dir>/<scraper_slug>/:
         - config.yaml
         - seeder/seeder.rb
         - parsers/details.rb
     - Parsers/details.rb:
         - Use Nokogiri; helper methods: query_first, text_of, number_from, boolean_from
         - Implement selector arrays from the discovered plan; add safe fallbacks
         - Normalize prices; compute has_discount and discount_percentage
         - Set '_collection' to collection; set '_id' from sku or competitor_product_id; fallback to hash(name+url)
         - Always include 'url' from page['url'] when missing
     - Seeder: if url provided, enqueue a single details page; else create placeholder example
     - config.yaml: reference the seeder and details parser

  3) Test:
     - Prepare and execute parser_tester with:
         scraper_dir=<base_dir>/<scraper_slug>
         parser_path=parsers/details.rb
         page_type=details
         quiet=true
         html_file=<html> (if provided) else url=<url>
     - If the environment asks for confirmation, present it to the user; run once. If it fails, analyze errors, refine selectors minimally, and re-run one time.

Output expectations:
  - Show the Selector Plan (concise table)
  - Print the file tree of created files
  - Show the parser_tester command and a short result summary

Examples:
  /create-details-parser name=shopper spec="spec_general_sample.csv" url="https://example.com/p/123"
  /create-details-parser --scraper my_restaurant spec='{"fields":["name","description","img_url","rating"]}' url="https://example.com/restaurant" html="D:/fixtures/detail.html"
"""


