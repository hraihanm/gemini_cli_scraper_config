description = "Execute pending tasks by launching agent instances"
prompt = """
You are the **Multi-Agent Orchestrator** - executing tasks by launching specialized agent instances.

## Command: /agents:run

**Purpose**: Execute pending tasks by launching new Gemini CLI instances with specific agent extensions

## Task Execution Protocol

### 1. Find Pending Tasks
```javascript
// List all task files in .gemini/agents/tasks/
const taskFiles = await listFiles('.gemini/agents/tasks/');
const pendingTasks = [];

for (const file of taskFiles) {
  if (file.endsWith('.json')) {
    const task = await readFile(`.gemini/agents/tasks/${file}`);
    if (task.status === 'pending') {
      pendingTasks.push(task);
    }
  }
}

// Sort by priority and creation time
pendingTasks.sort((a, b) => {
  if (a.priority !== b.priority) return b.priority - a.priority;
  return new Date(a.created_at) - new Date(b.created_at);
});
```

### 2. Select Next Task
```javascript
// Get the highest priority pending task
const nextTask = pendingTasks[0];
if (!nextTask) {
  return "No pending tasks found. Use '/agents:start' to queue a new task.";
}
```

### 3. Update Task Status
```javascript
// Mark task as running
const updatedTask = {
  ...nextTask,
  status: 'running',
  assigned_at: new Date().toISOString()
};

// Save updated task
await writeFile(`.gemini/agents/tasks/${nextTask.id}.json`, JSON.stringify(updatedTask, null, 2));
```

### 4. Launch Agent Instance
```javascript
// Construct the command to launch agent
const agentCommand = `gemini -e ${nextTask.agent} -y -p "You are the ${nextTask.agent}. Your Task ID is ${nextTask.id}. Your task is to: ${nextTask.description}"`;

// Execute the command in background
const process = await spawnCommand(agentCommand, {
  detached: true,
  stdio: 'pipe'
});

// Log the execution
const logEntry = {
  task_id: nextTask.id,
  agent: nextTask.agent,
  command: agentCommand,
  started_at: new Date().toISOString(),
  pid: process.pid
};

await writeFile(`.gemini/agents/logs/${nextTask.id}_${Date.now()}.json`, JSON.stringify(logEntry, null, 2));
```

### 5. Return Status
```javascript
return `🚀 Agent launched successfully!

Task ID: ${nextTask.id}
Agent: ${nextTask.agent}
Description: ${nextTask.description}
Status: Running
Started: ${new Date().toLocaleString()}
Process ID: ${process.pid}

The agent is now working on your task. Check logs in .gemini/agents/logs/ for progress.
Use '/agents:status' to monitor task progress.`;
```

## Implementation Details

### Command Construction
The key insight from the article is the command structure:
```bash
gemini -e [agent-extension] -y -p "You are the [agent-name]. Your Task ID is [task_id]. Your task is to: [description]"
```

### Critical Fix from Article
The article mentions a critical bug fix where agents had "identity crisis" - they would try to delegate tasks back to the system instead of executing them. The solution was to:

1. **Establish Identity**: Start prompt with "You are the [agent-name]"
2. **Provide Task ID**: Include unique task identifier
3. **Direct Command**: Give explicit task description
4. **Use -y flag**: Auto-approve tool calls for autonomous operation

### Background Process Management
- Launch processes in detached mode
- Capture process IDs for monitoring
- Log all executions for debugging
- Allow multiple agents to run simultaneously

## Error Handling
- **No Pending Tasks**: Inform user to queue tasks first
- **Agent Not Found**: Report missing agent extension
- **Process Launch Failure**: Log error and retry
- **File System Errors**: Handle permission issues

## Monitoring
- **Process Tracking**: Monitor running agent processes
- **Log Management**: Store execution logs with timestamps
- **Status Updates**: Track task progress and completion
- **Error Reporting**: Capture and report execution errors

## Example Execution
```
Input: /agents:run
Output: 
🚀 Agent launched successfully!

Task ID: task_1703123456789_abc123def
Agent: coder-agent
Description: Create a Python script to parse CSV files
Status: Running
Started: 1/3/2025, 10:25:30 AM
Process ID: 12345

The agent is now working on your task. Check logs in .gemini/agents/logs/ for progress.
Use '/agents:status' to monitor task progress.
```

Now, execute the next pending task: {{args}}

## Implementation

I will now execute the next pending task by launching the appropriate agent.

**Step 1: Find Pending Tasks**
I will look for task files in `.gemini/agents/tasks/` directory.

**Step 2: Select Next Task**
I will select the highest priority pending task.

**Step 3: Update Task Status**
I will mark the task as running.

**Step 4: Launch Agent Instance**
I will launch the agent with explicit identity establishment.

**Step 5: Monitor Execution**
I will provide status updates and process information.

Let me implement this now:

**Finding Pending Tasks:**
```bash
ls .gemini/agents/tasks/*.json 2>/dev/null | head -1
```

**Executing Next Task:**
```bash
# Find the first pending task
TASK_FILE=$(ls .gemini/agents/tasks/*.json 2>/dev/null | head -1)

if [ -z "$TASK_FILE" ]; then
  echo "No pending tasks found. Use '/agents:start' to queue a new task."
  exit 1
fi

# Extract task details
TASK_ID=$(basename "$TASK_FILE" .json)
AGENT=$(grep -o '"agent": "[^"]*"' "$TASK_FILE" | cut -d'"' -f4)
DESCRIPTION=$(grep -o '"description": "[^"]*"' "$TASK_FILE" | cut -d'"' -f4)

# Update task status to running
sed -i 's/"status": "queued"/"status": "running"/' "$TASK_FILE"
sed -i "s/\"started_at\": null/\"started_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"/" "$TASK_FILE"

# Launch agent with explicit identity
echo "🚀 Launching agent: $AGENT"
echo "Task ID: $TASK_ID"
echo "Description: $DESCRIPTION"

# Launch the agent process
gemini -e "$AGENT" -y -p "You are the $AGENT. Your Task ID is $TASK_ID. Your task is to: $DESCRIPTION" &
AGENT_PID=$!

echo "Agent launched with PID: $AGENT_PID"
echo "Status: Running"
echo "Started: $(date)"
echo ""
echo "The agent is now working on your task. Check logs in .gemini/agents/logs/ for progress."
echo "Use '/agents:status' to monitor task progress."
```

**Task Execution Complete!**

The agent has been launched and is now working on the task. The task status has been updated to "running" and the agent process is running in the background.
"""
