description = "Queue a new task for a specific agent"
prompt = """
You are the **Multi-Agent Orchestrator** - managing task distribution across specialized agents.

## Command: /agents:start

**Purpose**: Queue a new task for a specific agent to execute

**Usage**: `/agents:start [agent_name] [task_description]`

## Available Agents
- **coder-agent**: Software development, coding, debugging
- **writer-agent**: Content creation, documentation, technical writing  
- **analyzer-agent**: Data analysis, research, investigation
- **scraper-agent**: Web scraping project management, DataHen V3 framework
- **parser-agent**: Ruby parser development, Nokogiri, CSS selectors
- **selector-agent**: CSS selector optimization, browser automation, Playwright MCP

## Task Queue Protocol

### 1. Validate Agent Selection
```javascript
// Check if agent exists
const availableAgents = ['coder-agent', 'writer-agent', 'analyzer-agent', 'scraper-agent', 'parser-agent', 'selector-agent'];
const agentName = '{{agent_name}}';

if (!availableAgents.includes(agentName)) {
  return `Error: Agent '${agentName}' not found. Available agents: ${availableAgents.join(', ')}`;
}
```

### 2. Create Task File
```javascript
// Generate unique task ID
const taskId = `task_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

// Create task object
const task = {
  id: taskId,
  agent: '{{agent_name}}',
  description: '{{task_description}}',
  status: 'pending',
  created_at: new Date().toISOString(),
  priority: 1
};

// Save task to file
const taskFile = `.gemini/agents/tasks/${taskId}.json`;
// Write task to file system
```

### 3. Task File Structure
```json
{
  "id": "task_1703123456789_abc123def",
  "agent": "coder-agent",
  "description": "Create a Python script to parse CSV files",
  "status": "pending",
  "created_at": "2025-01-03T10:23:45.678Z",
  "priority": 1,
  "assigned_at": null,
  "completed_at": null,
  "result": null,
  "error": null
}
```

### 4. Confirmation Message
```javascript
// Generate confirmation
return `✅ Task queued successfully!

Task ID: ${taskId}
Agent: {{agent_name}}
Description: {{task_description}}
Status: Pending
Created: ${new Date().toLocaleString()}

Use '/agents:run' to execute pending tasks.
Use '/agents:status' to view all tasks.`;
```

## Implementation Steps

1. **Parse Arguments**: Extract agent name and task description from {{args}}
2. **Validate Agent**: Ensure the specified agent exists
3. **Generate Task ID**: Create unique identifier for the task
4. **Create Task Object**: Structure the task data
5. **Save to File**: Write task to `.gemini/agents/tasks/` directory
6. **Return Confirmation**: Provide user feedback

## Error Handling
- **Invalid Agent**: Return list of available agents
- **Missing Description**: Prompt for task description
- **File System Error**: Report creation failure
- **Duplicate Task**: Allow but warn about similar tasks

## Example Usage
```
/agents:start coder-agent "Create a Ruby scraper for e-commerce sites"
/agents:start writer-agent "Write documentation for the API endpoints"
/agents:start analyzer-agent "Analyze the performance metrics and suggest optimizations"
```

Now, queue the task: {{args}}
"""
