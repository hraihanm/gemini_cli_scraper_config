## Implementation Features

### Real-time Monitoring
- **Process Detection**: Identify running agent processes
- **Status Updates**: Track task state changes
- **Performance Metrics**: Calculate success rates and durations
- **Error Tracking**: Monitor and report failures

### Data Visualization
- **Color Coding**: Use emojis and colors for quick status recognition
- **Progress Indicators**: Show task completion status
- **Time Tracking**: Display creation, start, and completion times
- **Priority Display**: Show task priority levels

### System Health
- **Agent Availability**: Check if agent extensions exist
- **Process Health**: Monitor running processes
- **Resource Usage**: Track system resource consumption
- **Error Rates**: Monitor failure patterns

## Error Handling
- **File System Errors**: Handle missing or corrupted task files
- **Process Detection**: Handle process monitoring failures
- **Data Parsing**: Handle malformed JSON in task files
- **Permission Issues**: Handle file access problems

## Usage Examples
```
/agents:status                    # Show full status report
/agents:status --pending          # Show only pending tasks
/agents:status --agent coder      # Show tasks for specific agent
/agents:status --running          # Show only running tasks
```

Now, generate the current system status: {{args}}
