description = "View status of all tasks and running agents"
prompt = """
You are the **Multi-Agent Orchestrator** - monitoring and reporting on task status across all agents.

## Command: /agents:status

**Purpose**: Display comprehensive status of all tasks, running agents, and system health

## Status Report Protocol

### 1. Scan Task Directory
```javascript
// Read all task files
const taskFiles = await listFiles('.gemini/agents/tasks/');
const allTasks = [];

for (const file of taskFiles) {
  if (file.endsWith('.json')) {
    const task = await readFile(`.gemini/agents/tasks/${file}`);
    allTasks.push(task);
  }
}
```

### 2. Categorize Tasks
```javascript
// Group tasks by status
const tasksByStatus = {
  pending: allTasks.filter(t => t.status === 'pending'),
  running: allTasks.filter(t => t.status === 'running'),
  completed: allTasks.filter(t => t.status === 'completed'),
  failed: allTasks.filter(t => t.status === 'failed')
};

// Count by agent
const tasksByAgent = {};
allTasks.forEach(task => {
  if (!tasksByAgent[task.agent]) {
    tasksByAgent[task.agent] = { total: 0, pending: 0, running: 0, completed: 0, failed: 0 };
  }
  tasksByAgent[task.agent].total++;
  tasksByAgent[task.agent][task.status]++;
});
```

### 3. Check Running Processes
```javascript
// Check for running agent processes
const runningProcesses = await getRunningProcesses();
const agentProcesses = runningProcesses.filter(p => 
  p.command.includes('gemini') && p.command.includes('-e')
);
```

### 4. Generate Status Report
```javascript
// Create comprehensive status report
const report = {
  summary: {
    total_tasks: allTasks.length,
    pending: tasksByStatus.pending.length,
    running: tasksByStatus.running.length,
    completed: tasksByStatus.completed.length,
    failed: tasksByStatus.failed.length
  },
  agents: tasksByAgent,
  running_processes: agentProcesses.length,
  last_updated: new Date().toISOString()
};
```

