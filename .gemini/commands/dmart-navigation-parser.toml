     * **BATCH INSPECTION**: When inspecting multiple navigation elements (category links, product links, pagination), use batch mode to inspect them all at once:
       ```
       browser_inspect_element({
         element: "first product link", ref: "e42",
         batch: [
           { element: "second product link", ref: "e67" },
           { element: "next page button", ref: "e91" }
         ]
       })
       ```
   - Analyze pagination pattern (critical - check in priority order):

     **PAGINATION DETECTION SHORTCUT — run FIRST before manual strategy probing**:
     ```
     browser_detect_pagination({ current_url: "<current listing page URL>" })
     ```
     This tool checks 12+ count-element patterns, 8+ next-button patterns, and URL structure automatically.
     - If strategy: "count_based" → use `count_selector` and `url_pattern` from the result (skip to recording in step e)
     - If strategy: "next_button" → use `next_button_selector` from the result (skip to Strategy 2)
     - If strategy: "url_pattern" → use `url_pattern` from the result
     - If strategy: "unknown" → fall back to manual Strategy 1–5 probing below

     Only proceed to the manual strategies below if `browser_detect_pagination` returns strategy: "unknown".

     * **Strategy 1: Count-Based Calculation** (TOP PRIORITY - check FIRST):
       **CRITICAL**: This is the preferred strategy - try this first before other strategies

       a) **Discover product count selector**:
          - Use `browser_grep_html(query: "results")` or `browser_grep_html(query: "products")` to find the count element in HTML; then `browser_inspect_element()` if you need the exact selector
          - Common patterns: "Showing 1-24 of 150 results", "150 products", "Total: 150"
          - **To verify a count selector, use `browser_count_selector` instead of `browser_evaluate`**:
            ```
            browser_count_selector({ selector: ".results-count", expected_min: 1 })
            ```
            This is simpler than `browser_evaluate(() => document.querySelectorAll('.results-count').length)`.
          - For multi-page validation (A6), test the selector on a second page:
            ```
            browser_navigate("<second category URL>")
            browser_count_selector({ selector: "<product item selector>", expected_min: 1 })
            ```
            If count >= 1 on both pages, mark selector as verified with high confidence.
          - Fallback: Use `browser_evaluate()` to scan for count elements if `browser_grep_html` doesn't locate them:
            ```javascript
            browser_evaluate(() => {
              const countElements = document.querySelectorAll('[class*="count"], [class*="total"], [class*="results"], [class*="product-count"], [id*="count"], [id*="total"], p.result-count, .result-count');
              return Array.from(countElements).map(el => ({
                text: el.textContent,
                class: el.className,
                id: el.id,
                selector: el.tagName.toLowerCase() + (el.className ? '.' + el.className.split(' ').join('.') : '') + (el.id ? '#' + el.id : '')
              }));
            })
            ```
          - Record discovered selector in navigation-selectors.json
       
       b) **Extract count using regex patterns**:
          - Analyze count text to determine regex pattern
          - Common patterns:
            * `/(\\d+)\\s*(?:results?|products?|items?)/i` - "150 products"
            * `/(?:showing|mostrando|mostrar)\\s*\\d+[–-]\\d+\\s*(?:of|de)\\s*(\\d+)/i` - "Showing 1-24 of 150"
            * `/(\\d+)\\s*(?:total|en total)/i` - "150 total"
            * `/\\((\\d+)\\)/` - "(150)"
          - Test regex pattern with `browser_evaluate()` to extract number
          - Record regex pattern in navigation-selectors.json
       
       c) **Calculate products per page**:
          - Count products on current page using discovered product link selector
          - Use `browser_count_selector` to count product elements (preferred over `browser_evaluate`):
            ```
            browser_count_selector({ selector: "PLACEHOLDER_PRODUCT_LINK_SELECTOR", expected_min: 1 })
            ```
          - Fallback: `browser_evaluate(() => document.querySelectorAll('SELECTOR').length)`
          - Record products_per_page in navigation-selectors.json
       
       d) **Discover pagination pattern** (test how next pages are generated):
          **CRITICAL**: After finding product count, test pagination patterns to determine URL structure
          
          i) **Test Query Parameter Pattern** (most common):
             - Navigate to page 2 using query param: `current_url + "?page=2"`
             - Or try: `?p=2`, `?pagina=2`, `?pagenum=2`
             - Use `browser_navigate()` to test URL
             - Verify page 2 loads correctly (check if products change)
             - If works: Record pattern as `?page={num}` or `?p={num}` in navigation-selectors.json
          
          ii) **Test Path Pattern** (if query param doesn't work):
              - Navigate to page 2 using path: `base_path + "/page/2"`
              - Or try: `/pagina/2`, `/p/2`, `/page-2`
              - Use `browser_navigate()` to test URL
              - Verify page 2 loads correctly
              - If works: Record pattern as `/page/{num}` or `/pagina/{num}` in navigation-selectors.json
          
          iii) **Test Next Button** (if query/path patterns don't work):
               - Look for next button/link in pagination area
               - Use `browser_grep_html(query: "Next")` to see pagination HTML and identify next button selector; confirm with `browser_inspect_element()` if needed
               - Click next button or extract href from next button
               - Analyze next button href to determine pattern:
                 * If href contains `?page=2`: Use query param pattern
                 * If href contains `/page/2`: Use path pattern
                 * If href is relative: Extract pattern from href structure
               - Record next button selector and pattern in navigation-selectors.json
          
          iv) **Test Infinite Scroll** (if no pagination buttons/links found):
              - Use `browser_evaluate()` to scroll page and detect loading:
                ```javascript
                // Get initial product count
                browser_evaluate(() => {
                  const products = document.querySelectorAll('.product-item, .product-card, [class*="product"]');
                  return products.length;
                })
                
                // Scroll to bottom
                browser_evaluate(() => {
                  window.scrollTo(0, document.body.scrollHeight);
                  return new Promise(resolve => setTimeout(resolve, 2000));
                })
                
                // Check if more products loaded
                browser_evaluate(() => {
                  const products = document.querySelectorAll('.product-item, .product-card, [class*="product"]');
                  return products.length;
                })
                
                // Monitor network requests
                browser_network_requests_simplified()
                ```
              - If infinite scroll detected: Document API endpoint and parameters
              - **Note**: Infinite scroll requires browser automation - document in notes, Strategy 1 will use count-based calculation instead
       
       e) **Record Strategy 1 configuration**:
          - product_count_selector: Discovered CSS selector
          - product_count_regex: Discovered regex pattern
          - products_per_page: Count of products on first page
          - pagination_pattern: "query_param" or "path" or "next_button" (based on discovery)
          - pagination_url_template: Exact URL pattern (e.g., "?page={num}" or "/page/{num}")
          - **CRITICAL**: Strategy 1 is now active and will be used in listings.rb
     
     * **Strategy 2: Next Button** (check SECOND - most common):
       - Look for next button/link in pagination area
       - Use `browser_grep_html(query: "Next")` to see pagination HTML structure and identify next button selector; confirm with `browser_inspect_element()` if needed
       - Common selectors: `.next-page`, `a[aria-label="Next"]`, `.pagination .next`, `a.next`
       - Verify button exists and has href attribute
       - Extract next URL from button href
     
     * **Strategy 3: Infinite Scroll** (check THIRD - requires browser automation):
       - Use `browser_evaluate()` to scroll page and detect loading:
         ```javascript
         // Step 1: Get initial product count
         browser_evaluate(() => {
           const products = document.querySelectorAll('.product-item, .product-card, [class*="product"]');
           return products.length;
         })
         
         // Step 2: Scroll to bottom to trigger infinite scroll
         browser_evaluate(() => {
           window.scrollTo(0, document.body.scrollHeight);
           return new Promise(resolve => setTimeout(resolve, 2000)); // Wait for load
         })
         
         // Step 3: Check if more products loaded
         browser_evaluate(() => {
           const products = document.querySelectorAll('.product-item, .product-card, [class*="product"]');
           return products.length;
         })
         
         // Step 4: Monitor network requests during scroll (USE SIMPLIFIED VERSION)
         browser_network_requests_simplified()  // RECOMMENDED: Filtered network requests optimized for scraping
       ```
       - **CRITICAL**: Use `browser_network_requests_simplified()` instead of `browser_network_requests()`
       - **Why**: Simplified version filters out analytics, images, fonts - shows only relevant API calls
       - Analyze network requests for pagination API patterns:
         * Look for API endpoints with pagination params (page, offset, limit) in query params
         * Check POST body data for pagination parameters
         * Identify request payload structure
         * Extract pagination parameters from query params or POST body
       - If infinite scroll detected: Document API endpoint and parameters
       - **Note**: Infinite scroll requires browser automation - document in notes for manual implementation
     
     * **Strategy 4: Query Parameter Pattern** (check FOURTH):
       - Check if pagination uses ?page=2, ?page=3 pattern
       - Look for page parameter in current URL
       - Test pattern: current_url + "?page=2"
       - Verify pattern works by checking if page 2 exists
     
     * **Strategy 5: Path Pattern** (check FIFTH):
       - Check if pagination uses /page/2, /page/3 pattern
       - Look for /page/ pattern in URL structure
       - Test pattern: base_path + "/page/2"
       - Verify pattern works by checking if page 2 exists

