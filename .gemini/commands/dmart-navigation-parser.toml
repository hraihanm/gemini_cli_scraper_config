=== STEP 5b: Pipeline Smoke Test ===
**PURPOSE**: Verify the full navigation pipeline chains correctly end-to-end. `parser_tester` tests individual parsers in isolation — this step tests that parsers actually hand off to each other (categories enqueue listings, listings enqueue details, vars flow through correctly).

25b) Run pipeline smoke test using datahen_run:
   **NOTE**: `delay: 0` skips artificial HTTP delay — keep it fast during development

   a) Reset local state (clears queue and outputs, preserves HTTP cache):
      ```javascript
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "reset"
      })
      ```

   b) Seed the scraper (runs seeder.rb, populates initial queue):
      ```javascript
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "seed"
      })
      ```
      - Verify: Queue should contain the entry page_type (e.g., "categories") after seed

   c) Step through each navigation parser (count: 2 keeps it fast):
      ```javascript
      // Step categories
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "step", page_type: "categories", count: 2, delay: 0
      })
      // Step subcategories (only if has_subcategories == true from discovery-state.json)
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "step", page_type: "subcategories", count: 2, delay: 0
      })
      // Step listings
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "step", page_type: "listings", count: 2, delay: 0
      })
      ```

   d) Check queue state after pipeline run:
      ```javascript
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "status"
      })
      // Show pages waiting in queue — should include "details" page_type
      datahen_run({
        scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
        command: "pages", status_filter: "to_fetch", limit: 5
      })
      ```

   e) Validate pipeline results:
      - **PASS criteria** (all must be true):
        * No `parsing_failed` pages for any navigation parser
        * After listings step: `details` page_type pages appear in `to_fetch` queue
        * Queued detail pages contain vars (category_name, breadcrumb, rank, page_number)
      - **FAIL criteria** (if any, diagnose before proceeding):
        * `parsing_failed` pages → run `datahen_run({ command: "pages", status_filter: "parsing_failed", limit: 5 })`, read error, fix parser, re-run from step 25b-a
        * No detail pages in queue after listings step → listings parser not calling `save_pages` correctly
        * Detail pages missing vars → check vars hash in listings parser `pages <<` block

   f) If smoke test fails: Fix parser → reset → re-seed → re-step → re-check (loop until pass)

   g) Record smoke test outcome for inclusion in navigation-knowledge.md (next step):
      - Note: "Pipeline smoke test: PASSED / FAILED"
      - Note any parser fixes made during smoke test

