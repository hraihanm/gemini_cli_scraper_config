## Interactive Agent Spawning

### Agent Task Assignment
Each agent receives specific tasks based on aiconfig.yaml configuration:

**Navigation Agent Task**:
```
You are the navigation-agent. Your Task ID is nav_001.
Your task is to: Analyze website structure for PNS HK (https://www.pns.hk/en/) 
based on aiconfig.yaml configuration. Focus on:
- Category navigation patterns for 'categories' page type
- Subcategory hierarchies for 'subcategories' page type  
- Product listing patterns for 'listings' page type
- URL structures and pagination mechanisms

Use browser tools to analyze the site structure and document your findings.
Save results to .gemini/agents/plans/site_analysis.md
```

**Selector Agent Task**:
```
You are the selector-agent. Your Task ID is sel_001.
Your task is to: Create CSS selectors for PNS HK listings page based on aiconfig.yaml.
Required fields: competitor_product_id, name, brand, category, customer_price_lc, 
base_price_lc, has_discount, discount_percentage, img_url, sku, url, is_available, etc.
Use browser tools to verify all selectors with >90% accuracy.
Save results to .gemini/agents/plans/selector_map.md
```

**Parser Agent Task**:
```
You are the parser-agent. Your Task ID is par_001.
Your task is to: Generate Ruby parser for PNS HK listings page matching aiconfig.yaml.
Implement all 25+ configured fields with proper error handling.
Use verified selectors from selector-agent analysis.
Test with parser_tester MCP tool using downloaded HTML.
Save parser to .gemini/agents/workspace/generated_scraper/pns-hk-scraper/parsers/
```

## AIConfig Configuration Parsing

### Parse aiconfig.yaml for Agent Tasks
```ruby
# Parse aiconfig.yaml to create agent tasks
def parse_aiconfig_for_agents(config_file)
  config = YAML.load_file(config_file)
  
  config['parsers'].each do |parser|
    page_type = parser['page_type']
    fields = parser['outputs'].first['fields']
    
    # Create Navigation Agent task
    create_navigation_task(page_type, parser)
    
    # Create Selector Agent task
    create_selector_task(page_type, fields)
    
    # Create Parser Agent task
    create_parser_task(page_type, fields)
  end
end
```

### Field Mapping for Agents
```ruby
# Map AIConfig fields to agent tasks
def map_fields_to_agents(fields)
  {
    navigation_agent: {
      focus_areas: ['category_navigation', 'pagination', 'url_patterns']
    },
    selector_agent: {
      required_fields: fields.map { |f| f['name'] },
      field_descriptions: fields.map { |f| f['description'] }
    },
    parser_agent: {
      output_fields: fields.map { |f| f['name'] },
      field_types: fields.map { |f| f['type'] || 'string' }
    }
  }
end
```

## Interactive Process Management

### Process Launch Commands

**Key Feature**: All agents launch in **interactive mode** using `gemini -i` instead of `gemini -p`, allowing real-time monitoring and intervention.

```powershell
# Windows PowerShell - Launch Navigation Agent (Interactive Mode)
.\\launch_agent.ps1 -Agent "navigation-agent" -PageType "categories" -TaskId "nav_001" -TargetUrl "https://www.pns.hk/en/" -Description "Analyze website structure for PNS HK categories page"

# Windows PowerShell - Launch Selector Agent (Interactive Mode)
.\\launch_agent.ps1 -Agent "selector-agent" -PageType "listings" -TaskId "sel_001" -TargetUrl "https://www.pns.hk/en/grocery/lc/04040000" -Description "Create CSS selectors for PNS HK listings page"

# Windows PowerShell - Launch Parser Agent (Interactive Mode)
.\\launch_agent.ps1 -Agent "parser-agent" -PageType "listings" -TaskId "par_001" -TargetUrl "https://www.pns.hk/en/grocery/lc/04040000" -Description "Generate Ruby parser for PNS HK listings page"
```

**Interactive Mode Benefits**:
- **Real-time Monitoring**: See exactly what each agent is doing
- **Immediate Intervention**: Stop, modify, or guide agents as needed
- **Error Handling**: Catch and fix issues as they happen
- **Quality Control**: Ensure agents follow the correct workflow

```bash
# Linux/Mac - Launch Navigation Agent
./launch_agent.sh navigation-agent categories nav_001 "https://www.pns.hk/en/" "Analyze website structure for PNS HK categories page"

# Linux/Mac - Launch Selector Agent
./launch_agent.sh selector-agent listings sel_001 "https://www.pns.hk/en/grocery/lc/04040000" "Create CSS selectors for PNS HK listings page"

# Linux/Mac - Launch Parser Agent
./launch_agent.sh parser-agent listings par_001 "https://www.pns.hk/en/grocery/lc/04040000" "Generate Ruby parser for PNS HK listings page"
```

