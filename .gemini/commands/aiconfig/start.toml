## Argument Parsing Instructions

**CRITICAL**: Parse the arguments from `{{args}}` using the following format:
- **Format**: `action page_type [scraper_name] [options]`
- **Actions**: `analyze`, `parser`, `all`
- **Page Types**: `categories`, `subcategories`, `listings`, `details`
- **Scraper Name**: Optional, defaults to "pns-hk-scraper" if not provided

**Parse the input**: `{{args}}`

**Examples of valid input**:
- `analyze categories pns-hk-scraper` → Action: analyze, Page Type: categories, Scraper: pns-hk-scraper
- `parser listings my-scraper` → Action: parser, Page Type: listings, Scraper: my-scraper
- `all pns-hk-scraper` → Action: all, Page Type: all, Scraper: pns-hk-scraper
- `parser details` → Action: parser, Page Type: details, Scraper: pns-hk-scraper (default)

**Your task**: Parse the arguments and execute the appropriate action based on the parsed values.

## IMPORTANT: Simplified 2-Agent Structure

**CRITICAL**: This system now uses only 2 agents:
1. **navigation-agent**: Website structure analysis and navigation pattern discovery
2. **parser-agent**: CSS selector discovery + Ruby parser generation + verification

**DO NOT** launch selector-agent - it has been removed. The parser-agent now handles both selector discovery and parser generation.

## Master Agent Coordination

**IMPORTANT**: With YOLO mode enabled, the master agent will complete quickly and exit. To maintain coordination and monitoring, use the coordinator script.

### Coordination Options

1. **Launch with Coordinator** (Recommended):
   ```powershell
   # Launch agents and start coordination
   .\\.gemini\\agents\\scripts\\launch_agent.ps1 -Agent "navigation-agent" -PageType "categories" -TaskId "nav_001" -TargetUrl "https://www.pns.hk/en/" -Description "Analyze website structure for PNS HK categories page"
   .\\.gemini\\agents\\scripts\\launch_agent.ps1 -Agent "parser-agent" -PageType "listings" -TaskId "par_001" -TargetUrl "https://www.pns.hk/en/grocery/lc/04040000" -Description "Discover CSS selectors and generate Ruby parser for PNS HK listings page"
   .\\.gemini\\agents\\scripts\\launch_agent.ps1 -Agent "parser-agent" -PageType "details" -TaskId "par_002" -TargetUrl "https://www.pns.hk/en/grocery/lc/04040000" -Description "Discover CSS selectors and generate Ruby parser for PNS HK details page"
   
   # Start coordination monitoring
   .\\.gemini\\agents\\scripts\\coordinator.ps1 -ScraperName "pns-hk-scraper"
   ```

2. **Manual Monitoring**:
   - Use `/aiconfig:monitor status` to check task status
   - Use `/aiconfig:monitor logs [agent]` to view agent logs
   - Use `/aiconfig:monitor results [page_type]` to view results

### YOLO Mode Benefits
- **No Interruptions**: Agents work continuously without waiting for approval
- **Faster Execution**: All tool calls are auto-approved
- **Real-time Monitoring**: You can still see what agents are doing
- **Filesystem State**: All coordination happens through files

