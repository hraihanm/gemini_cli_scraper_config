**CRITICAL**: Parse the arguments from `{{args}}` using the following format:
- **Format**: `agent [page_type] [task_description]`
- **Agents**: `navigation-agent`, `parser-agent`, `all`
- **Page Types**: `categories`, `subcategories`, `listings`, `details`
