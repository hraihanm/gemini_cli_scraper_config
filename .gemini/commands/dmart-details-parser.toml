4) Handle field specification:
   - If `spec` parameter provided: Parse spec file (CSV or JSON) and create/update field-spec.json
   - If `spec` parameter not provided: Check for existing field-spec.json
   - If field-spec.json exists: Use it to guide field discovery
   - If field-spec.json missing: Discover common fields (fallback mode)

5) Validate prerequisites:
   - **REQUIRED**: navigation-selectors.json must exist (run `/dmart-navigation-parser` first if missing)
   - **REQUIRED**: details.rb parser must exist from boilerplate (run `/dmart-scrape` first if missing)
   - If missing: Display error: "Navigation parsers or boilerplate not found. Run: /dmart-scrape url=<url> name=<scraper> then /dmart-navigation-parser scraper=<scraper>"
   - If exists: Continue with detail parser editing

6) Check for existing detail parser and test it:
   **CRITICAL**: Before editing parser, test existing parser to see if it already works
   
   a) Check if `parsers/details.rb` exists (should exist from boilerplate):
      - If exists: Read parser code (already loaded in step 2)
      - Navigate to sample detail URL (if not already there)
      - Test parser using parser_tester MCP tool (RECOMMENDED - uses auto_download):
        ```javascript
        parser_tester({
          scraper_dir: "<absolute_path>/generated_scraper/<scraper>",
          parser_path: "parsers/details.rb",
          page_type: "details",
          auto_download: true,  // RECOMMENDED: Automatically downloads HTML from active browser tab
          vars: '{"category_name":"Electronics","breadcrumb":"Electronics","rank":1,"page_number":1}',
          quiet: false
        })
        ```
   
   b) Analyze test results:
      - **If test passes**: 
        * Parser is working correctly (unlikely with PLACEHOLDER strings, but possible)
        * Option 1: Skip editing (parser already good)
        * Option 2: Enhance with additional fields from field-spec.json
        * Option 3: Verify selectors still work, then continue
      - **If test fails** (expected with PLACEHOLDER strings):
        * Analyze failure reason (PLACEHOLDER strings need replacement? missing fields?)
        * Discover new/updated selectors
        * Edit existing parser (don't regenerate from scratch)
        * Preserve working parts, fix broken selectors
      - **If parser doesn't exist** (should not happen with boilerplate):
        * Report error - boilerplate should have details.rb
   
   c) Decision logic:
      - **Parser exists AND test passes**: Can enhance or skip
      - **Parser exists AND test fails**: Edit parser with discovered selectors (replace PLACEHOLDERs)
      - **Parser doesn't exist**: Report error - boilerplate should have all parsers

**Note**: If a file doesn't exist, read_file will return an error - handle gracefully and continue with other files.

🚨 **REMINDER**: You just called read_file tool for each file - that's correct! Continue using tools directly, don't write code.

=== STEP 2: Determine Detail URL ===
7) Priority order for detail URL:
   - resume-url parameter (if provided)
   - url parameter (if provided)
   - navigation-selectors.json['listings']['sample_detail_urls'][0]
   - discovery-state.json['sample_urls']['detail']
   - Must ask user if none available

=== STEP 3: Selector Discovery ===
🚨 **REMINDER**: Use browser_navigate tool directly - don't write code to navigate.

8) Navigate to detail page (if parser test failed):
   - browser_navigate(detail_url)
   
   **🚨 CRITICAL PRIORITY: Handle popups/overlays FIRST before any other operations**
   
   **Popup Handling Workflow** (execute immediately after navigation):
   
   a) **Step 1 - Check for existing strategy**:
      - Check discovery-state.json for existing popup_handling strategy (if available from site discovery)
      - **If popup_handling exists**: Try using documented selectors/coordinates first
   
   b) **Step 2 - Check for popups**:
      - browser_snapshot() to check accessibility tree for popup elements
      - browser_screenshot() to visually inspect for popups/modals/cookie banners
   
   c) **Step 3 - First strategy: ESC key press**:
      - If popup detected (in snapshot or screenshot):
        * Try pressing ESC key using browser_press_key("Escape") to dismiss modal/overlay
        * **Note**: ESC key often closes modals, popups, and overlays without needing to find buttons
        * browser_snapshot() to verify popup dismissed
        * **If failed (popup still present)**: Proceed to Step 4
   
   d) **Step 4 - Second strategy: Click upper left corner**:
      - If popup still present after Step 3:
        * Click in the upper left corner of the viewport (e.g., coordinates 10, 10) using browser_mouse_click_xy("Upper left corner", 10, 10)
        * **Note**: This often dismisses overlays/modals that can be closed by clicking outside the content area
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * browser_snapshot() to verify popup dismissed
        * **If failed (popup still present)**: Proceed to Step 5
   
   e) **Step 5 - Third strategy: Selector-based attempt (1 attempt only)**:
      - If popup detected in snapshot:
        * Use browser_click() with element ref or selector to interact:
          - Cookie banners: Click "Accept", "Accept All", or "I Agree" buttons
          - Notifications: Click "Later", "Not Now", or "Skip" buttons
          - Popups/modals: Click close button (X), "Close", or overlay to dismiss
        * Common selectors to check: `[id*="cookie"]`, `[class*="cookie"]`, `[id*="popup"]`, `[class*="modal"]`, `button:contains("Accept")`, `button:contains("Later")`
        * browser_snapshot() to verify popup dismissed
        * **If failed (popup still present)**: Proceed to Step 6
   
   f) **Step 6 - Final fallback: Coordinate-based on specific button (if Step 5 failed)**:
      - If popup visible in screenshot BUT NOT dismissed by Step 5 (or not in snapshot):
        * Analyze screenshot (AI vision) to identify button location
        * Extract coordinates (x, y) from button center region
        * Use browser_mouse_click_xy("Accept button", x, y) to click by coordinates
        * **Note**: browser_mouse_click_xy requires --caps=vision capability flag
        * **Important**: Coordinate clicks are viewport-relative; click center of button region, not edge
        * browser_snapshot() to verify popup dismissed
   
   g) **Step 7 - Final verification**:
      - browser_snapshot() to confirm page is ready (no popups blocking interaction)
      - **Only proceed to page analysis after popups are confirmed dismissed**
   
   - **Logging**: If coordinate-based click was used, document in detail-knowledge.md for future reference
   
   - browser_snapshot()
   - **TRACK URL**: Record this URL in detail-selectors.json under `urls_accessed.discovery_urls`

9) Discover selectors for each field (browser-first workflow):
   **CRITICAL**: Systematically discover ALL FIND fields from field-spec.json in priority order
   **CRITICAL**: Do NOT skip fields - iterate through ALL FIND fields regardless of whether they're "common" or not

   **🚨 PRE-CHECK: JSON-LD + Meta Tags (do this BEFORE per-field CSS selector discovery)**

   a0) **JSON-LD structured data check (Priority 1 — most reliable)**:
       Many modern e-commerce sites embed complete schema.org `Product` data in JSON-LD.
       Extracting it once covers name, price, brand, description, images, availability, SKU, GTIN in one shot.

       - Run: `browser_extract_json_ld({ type: "Product" })`
       - If found (found: true):
         * The `data` object contains the parsed JSON-LD. `fields_available` lists discoverable fields.
         * `script_tag_selector` gives you the exact CSS selector to use in Ruby (e.g., `script[type="application/ld+json"]`).
         * For each field in `fields_available` that maps to one of the 53 output fields, mark it as "discovered via JSON-LD".
         * Also check for `"@graph"` format if needed: `browser_grep_html(query: "@graph")`
         * Document the full JSON-LD structure in detail-knowledge.md
         * For every FIND field that maps to a JSON-LD key, write the Ruby extraction as:
           ```ruby
           require 'json'
           json_ld = html.css('script[type="application/ld+json"]').lazy.map { |s|
             begin
               parsed = JSON.parse(s.text)
               parsed.is_a?(Hash) && parsed['@graph'].is_a?(Array) ?
                 parsed['@graph'].find { |i| i['@type'] == 'Product' } :
                 (parsed['@type'] == 'Product' ? parsed : nil)
             rescue JSON::ParserError; nil end
           }.find(&:itself)

           # Example field extractions from JSON-LD:
           name        = json_ld&.dig('name')&.strip
           description = json_ld&.dig('description')&.strip
           brand       = json_ld&.dig('brand', 'name') || json_ld&.dig('brand')
           sku         = json_ld&.dig('sku')
           barcode     = json_ld&.dig('gtin13') || json_ld&.dig('gtin8') || json_ld&.dig('gtin')
           img_url     = json_ld&.dig('image').then { |i| i.is_a?(Array) ? i[0] : i }
           # Availability: schema.org uses URLs like "https://schema.org/InStock"
           json_ld_avail = json_ld&.dig('offers', 'availability') || json_ld&.dig('offers', 0, 'availability')
           is_available  = json_ld_avail&.include?('InStock') if json_ld_avail
           # Price: offers.price (single offer) or offers[0].price (multiple)
           json_ld_price = json_ld&.dig('offers', 'price') || json_ld&.dig('offers', 0, 'price')
           customer_price_lc = json_ld_price&.to_f
           ```
         * Mark those fields as discovered in field-spec.json (no CSS selector needed)
         * For each JSON-LD field found, use it as PRIMARY source and CSS selector as fallback only.
         * For fields NOT covered by JSON-LD, proceed to CSS selector discovery below (step ii)

       - If not found (found: false): proceed directly to CSS selector discovery for all fields

   a0b) **Meta tag fallbacks (Priority 2 — for img_url and name only)**:
       Even without JSON-LD, Open Graph tags are a reliable fallback for key fields:
       ```ruby
       og_image = html.at_css('meta[property="og:image"]')&.[]('content')
       og_title = html.at_css('meta[property="og:title"]')&.[]('content')&.strip
       ```
       - Use `og_image` as fallback when primary CSS selector for img_url is nil
       - Use `og_title` as fallback when primary CSS selector for name is nil
       - Write Ruby code as: `img_url = primary_img_css_result || og_image`

   a0c) **Image gallery discovery (img_url, img_url_2, additional_images)**:
       For image fields, use a dedicated tool instead of multiple browser_evaluate calls:
       - First try JSON-LD: `json_ld_image` already extracted in step a0 (if available) — use as img_url primary source
       - Then try OG meta: `og_image` (see a0b above) — use as fallback
       - For gallery/additional images: use `browser_extract_images({ container_selector: "<gallery container CSS selector>" })`
         * Run `browser_snapshot()` to identify the gallery container ref
         * Run `browser_inspect_element(ref)` to get its CSS selector
         * Then call: `browser_extract_images({ container_selector: "<discovered CSS selector>" })`
         * Result contains:
           - `primary_url`: Use for img_url (if JSON-LD/OG not available)
           - `images`: Array of all image URLs — use for img_url_2, img_url_3, additional_images
           - `lazy_load_pattern`: Tells you which data attribute the site uses (data-src, data-lazy, etc.)
       - Use `browser_extract_images` instead of multiple `browser_evaluate` calls for different data-src variants

   a) Load and validate field-spec.json:
      - Read field-spec.json (already loaded in step 1)
      - Verify structure: fields array, discovery_status object
      - Count total FIND fields: fields where extraction_method == "FIND"
      - Count already discovered: fields where discovered == true
      - **CRITICAL**: You MUST discover ALL FIND fields, not just common ones
   
   b) **SYSTEMATIC ITERATION**: Iterate through ALL FIND fields in priority order (1→2→3→4):
      **CRITICAL**: This is a MANDATORY loop - you MUST process every FIND field
      
      For each field in field-spec.json.fields (sorted by priority):
      
      i) **Check if field needs discovery**:
         - Skip if extraction_method != "FIND" (PROCESS, DETERMINE, INFER, HARDCODED, null)
         - Skip if discovered == true (already discovered in previous run)
         - **Continue if extraction_method == "FIND" AND discovered == false**
      
      ii) **Discover selector for this field**:
          - Use field name to identify what to extract (e.g., "description", "barcode", "type_of_promotion")

          **Step 1 — browser_grep_html (start here, most efficient)**:
          - Call `browser_grep_html(query: "<visible_text_value_of_the_field>")` using the actual text visible on the page
            * Example: field "name" → `browser_grep_html(query: "Samsung Galaxy S24")`
            * Example: field "price" → `browser_grep_html(query: "KSh 89,999")`
            * Example: field "brand" → `browser_grep_html(query: "Samsung")`
            * Returns HTML snippets with >>>match<<< markers showing class names, data attributes, and DOM structure
            * Identify the CSS selector directly from the snippet (e.g., `span.product-price`, `[data-brand]`)
          - Token-efficient: returns only matching context, not the entire page HTML

          **Step 2 — browser_inspect_element (when you have a ref or grep is ambiguous)**:
          - If browser_snapshot() gave you a ref for this field, call `browser_inspect_element(ref)` for the exact verified selector
          - Use when the grep snippet shows multiple candidate classes and you need to confirm the right one
          - **BATCH INSPECTION**: When you have multiple element refs to inspect, use batch mode to inspect them all in one call:
            ```
            browser_inspect_element({
              element: "product name", ref: "e42",
              batch: [{ element: "price", ref: "e67" }, { element: "brand", ref: "e91" }]
            })
            ```
            This returns CSS selectors for all elements in one call — use batch mode whenever inspecting more than one ref.

          **Step 3 — Verify**:
          - Use `browser_verify_selector()` for text fields (names, prices, labels, descriptions)
          - Use `browser_verify_selector(element, selector, expected, attribute: "src")` for img src, href, and data-* attributes — **do NOT use `browser_evaluate` for attribute verification**
          - Use `browser_evaluate()` only for complex JavaScript-based extraction (not for simple attribute reads)

          - Try multiple strategies if steps 1-3 fail:
            * Check if field exists in breadcrumb (for brand, category)
            * Check if field exists in product attributes/data attributes
            * `browser_grep_html(query: "ld+json", isRegex: false)` or `browser_grep_html(query: "@type")` to find JSON-LD structured data
            * Check if field exists in visible text with pattern matching
          - Fallback to browser_view_html() only if all targeted approaches fail (high token cost)
      
      iii) **Update field-spec.json immediately after discovery**:
          - Add discovered selector(s) to field.selectors array
          - Set field.discovered = true
          - Set field.verified = true (after browser verification)
          - Add field.confidence = 0.0-1.0 (based on verification success)
          - Add field.extraction_notes = "Description of how selector was found"
          - **Save field-spec.json after each field discovery** (or batch every 5 fields)
      
      iv) **Track discovery progress**:
          - Update discovery_status.discovered_fields count
          - Update discovery_status.verified_fields count
          - Update discovery_status.pending_fields = find_fields - discovered_fields
          - Update discovery_status.last_discovery_at = current timestamp
   
   c) **Discovery completion report**:
      After iterating through ALL FIND fields:
      - Count discovered_fields: fields where discovered == true
      - Count failed_fields: FIND fields where discovered == false
      - **Count all field types** for discovery_summary:
        * total_fields: Count of ALL fields in field-spec.json (FIND + PROCESS + DETERMINE + INFER + HARDCODED)
        * find_fields: Count of fields where extraction_method == "FIND"
        * process_fields: Count of fields where extraction_method == "PROCESS"
        * determine_fields: Count of fields where extraction_method == "DETERMINE"
        * infer_fields: Count of fields where extraction_method == "INFER"
        * hardcoded_fields: Count of fields where extraction_method == "HARDCODED"
      - Report discovery summary:
        * "Discovered: X/Y FIND fields (Priority 1: A/B, Priority 2: C/D, Priority 3: E/F, Priority 4: G/H)"
        * "Total fields: 53 (FIND: 15, PROCESS: 10, DETERMINE: 5, INFER: 3, HARDCODED: 20)"
        * List any failed fields (fields that couldn't be discovered)
        * Note: Some fields may be optional (e.g., barcode, allergens) - document as "not available on site"
   
   d) **Common fields fallback** (if field-spec.json missing):
      Only use this if field-spec.json doesn't exist:
      * Product name (replace `name = "PLACEHOLDER"`)
      * Brand
      * SKU / Product ID (replace `sku_element = html.at_css('PLACEHOLDER')`)
      * Customer price (replace `customer_price_text = html.at_css('PLACEHOLDER')`)
      * Base price (replace `base_price_text = html.at_css('PLACEHOLDER')`)
      * Description
      * Images (primary and secondary)
      * Availability status (replace `is_available = html.at_css('PLACEHOLDER')`)

10) Update field-spec.json with discovery results:
   **CRITICAL**: Save updated field-spec.json with ALL discovery results
   
   a) Update discovery_status section:
      ```json
      {
        "discovery_status": {
          "total_fields": 53,
          "find_fields": 15,
          "discovered_fields": 15,
          "verified_fields": 15,
          "pending_fields": 0,
          "process_fields": 10,
          "determine_fields": 5,
          "infer_fields": 3,
          "hardcoded_fields": 20,
          "last_discovery_at": "<timestamp>"
        }
      }
      ```
      
      **CRITICAL**: Calculate counts for ALL field types:
      - total_fields: Count ALL fields in field-spec.json.fields
      - find_fields: Count where extraction_method == "FIND"
      - process_fields: Count where extraction_method == "PROCESS"
      - determine_fields: Count where extraction_method == "DETERMINE"
