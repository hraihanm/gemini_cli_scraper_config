description = "Generate a concise summary of current work progress for manual resume in new session."

prompt = """
Generate a concise, actionable summary of current work that can be used to resume in a new session after hitting token limits.

**Purpose:** When approaching token limits or session interruptions, create a summary that allows seamless continuation.

Inputs (order-agnostic via {{args}}):
  - scraper=<scraper_name> (REQUIRED)
  - task=<current_task> (OPTIONAL - current task description)
  - save-to=<path> (OPTIONAL - save summary to file)

Process:

1) Analyze Current Context:
   - What scraper are we working on?
   - What phase/task is currently in progress?
   - What selectors/parsers have been discovered/completed?
   - What files have been created/modified?
   - What's the current browser URL/product being analyzed?

2) Check Existing State Files:
   - Load detail-selectors.json (if exists) - shows discovered selectors
   - Load navigation-selectors.json (if exists)
   - Load phase-status.json (if exists) - shows completed phases
   - Check generated parser files for current state

3) Generate Summary:
   ```
   # Resume Summary for <scraper_name>
   
   ## Current Status
   - Scraper: <scraper_name>
   - Phase: <current_phase>
   - Current Task: <current_task>
   
   ## Completed Work
   - <item_1>: <brief_description>
   - <item_2>: <brief_description>
   
   ## Discovered Selectors (from detail-selectors.json)
   - customer_price: <selector>
   - base_price: <selector or status>
   - ... other fields
   
   ## In Progress
   - <what_is_being_worked_on_now>
   
   ## Current Context
   - Browser URL: <current_url>
   - Current Product: <product_name>
   - Last Action: <last_action_taken>
   
   ## Next Steps
   1. <next_action_1>
   2. <next_action_2>
   3. <next_action_3>
   
   ## Resume Instructions
   To resume:
   1. Navigate to <current_url>
   2. Continue from: <current_task>
   3. Focus on: <what_needs_finishing>
   ```

4) Save to Session Progress File:
   - Save summary to `generated_scraper/<scraper>/.scraper-state/session-progress.json`
   - Also save as readable markdown: `generated_scraper/<scraper>/.scraper-state/resume-summary.md`

5) Display Summary:
   - Show formatted summary to user
   - Provide copy-paste ready resume instructions
   - Confirm files saved for future `/resume-work` command

Examples:
  /create-summary scraper=naivas_online
  /create-summary scraper=my_store task="finding base_price selector"
  /create-summary scraper=shop save-to="./progress.md"
"""

