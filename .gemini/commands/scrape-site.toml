description = "Phase 1: Site discovery and scraper directory setup. Analyzes site structure, writes discovery knowledge, completes independently."

prompt = """
You are performing Phase 1: Site Discovery for scraper generation. This command is COMPLETELY INDEPENDENT - it reads no conversation history, only state files. It writes ALL findings to files before completion.

🚨 MODULAR DESIGN PRINCIPLES:
1. **Read State Files First** - Check for existing discovery-state.json
2. **Write ALL Findings** - Before completion, write everything discovered
3. **Write Knowledge Files** - Human-readable + AI-readable summaries
4. **Self-Contained** - All needed info comes from state files or user input
5. **Clear Completion** - Report what's done, what's next, how to continue

🚨 CRITICAL - ABSOLUTE PATHS REQUIRED:
- **ALL WriteFile operations MUST use ABSOLUTE PATHS** - Relative paths will fail
- Before writing any file, convert relative path to absolute:
  * Determine workspace root (current working directory)
  * Convert: `generated_scraper/<scraper>/.scraper-state/file.json`
  * To absolute: `<workspace_root>/generated_scraper/<scraper>/.scraper-state/file.json`
  * Example: `D:\\DataHen\\projects\\gemini_cli_testbed\\generated_scraper\\naivas_online\\.scraper-state\\phase-status.json`
- Use absolute paths for: phase-status.json, discovery-state.json, discovery-knowledge.md, browser-context.json

Inputs (order-agnostic via {{args}}):
  - url=<site_url> (REQUIRED - target website URL) - USE THIS EXACT URL ONLY
  - name=<scraper_name> | --scraper <scraper_name> (REQUIRED)
  - spec=<path-to-CSV-or-JSON> (OPTIONAL - field specification file, e.g., spec_general_sample.csv)
  - out=<base_dir> (OPTIONAL, default: "./generated_scraper")

CRITICAL: Parse {{args}} immediately and extract the `url` parameter. Use ONLY that URL - ignore any other URLs in context.

Process:

=== STEP 1: Load State Files (if exist) ===
**CRITICAL**: Use ReadManyFiles to load state files (ReadFile fails due to ignore patterns)

1) Load existing state files using ReadManyFiles:
   ```javascript
   ReadManyFiles({
     patterns: [
       "generated_scraper/<scraper_slug>/.scraper-state/phase-status.json",
       "generated_scraper/<scraper_slug>/.scraper-state/discovery-state.json",
       "generated_scraper/<scraper_slug>/.scraper-state/discovery-knowledge.md"
     ],
     target_directory: "<workspace_root>"
   })
   ```

2) Handle results:
   - **If phase-status.json exists**: Parse and check site_discovery.status
     * If "completed": Display summary, suggest next phase (`/create-navigation-parser`)
     * If "in_progress": Resume from checkpoint
     * Else: Start fresh discovery
   - **If discovery-state.json exists**: Parse site structure, use for context
   - **If discovery-knowledge.md exists**: Read for additional context
   - **If no files exist**: Start fresh discovery (expected for first run)

**Note**: ReadManyFiles will return empty/not found for missing files - handle gracefully.

=== STEP 2: Parse Field Specification (if provided) ===
2) If `spec` parameter provided:
   a) Read spec file (CSV or JSON):
      - CSV format: `column_name,column_type,dev_notes`
      - Parse each row to extract: field name, type, extraction method (FIND/PROCESS), notes
      - Normalize field names to snake_case
   
   b) Create field-spec.json structure:
      ```json
      {
        "source_file": "<spec_file_path>",
        "parsed_at": "<timestamp>",
        "fields": [
          {
            "name": "competitor_product_id",
            "type": "str",
            "extraction_method": "FIND",
            "notes": "Find the product-id if possible or else use sku or barcode",
            "selectors": [],
            "verified": false
          },
          {
            "name": "has_discount",
            "type": "boolean",
            "extraction_method": "PROCESS",
            "notes": "true if it has discount",
            "computation": "customer_price_lc < base_price_lc"
          }
        ]
      }
      ```
   
   c) Save field-spec.json (USE ABSOLUTE PATH):
      - Path: `generated_scraper/<scraper>/.scraper-state/field-spec.json`
      - This will be used by create-details-parser to guide field discovery

=== STEP 3: Initialize Directory Structure ===
3) Create scraper directory structure:
   ```
   generated_scraper/<scraper_slug>/
   ├── .scraper-state/          # State directory
   ├── seeder/                   # Seeder directory
   │   └── seeder.rb            # Will be generated
   ├── parsers/                  # Will be created by parser commands
   └── config.yaml              # Will be generated
   ```

**CRITICAL - ABSOLUTE PATHS FOR FILE WRITES:**
Before writing ANY file, convert relative path to absolute:
- Determine workspace root (current working directory)
- Convert: `generated_scraper/<scraper>/.scraper-state/file.json`
- To absolute: `<workspace_root>/generated_scraper/<scraper>/.scraper-state/file.json`
- Example: `D:\\DataHen\\projects\\gemini_cli_testbed\\generated_scraper\\naivas_online\\.scraper-state\\phase-status.json`

4) Initialize phase-status.json (USE ABSOLUTE PATH):
   ```json
   {
     "scraper_name": "<scraper_slug>",
     "version": "1.0.0",
     "created_at": "<timestamp>",
     "current_phase": "site_discovery",
     "completed_phases": [],
     "phase_status": {
       "site_discovery": {"status": "in_progress"},
       "navigation_discovery": {"status": "pending"},
       "detail_discovery": {"status": "pending"}
     }
   }
   ```

=== STEP 4: Site Discovery ===
5) Navigate to site URL (from {{args}} parameter):
   - Extract URL from {{args}}: `url="https://example.com"` → use `https://example.com`
   - browser_navigate(extracted_url)
   - browser_snapshot() to understand page structure

6) Analyze site structure:
   - Detect navigation patterns:
     * Main menu/category links
     * Breadcrumb structure
     * Product listing patterns
     * Pagination indicators
   - Identify page types:
     * Categories page (main navigation)
     * Subcategories page (nested navigation) - optional
     * Listings page (product grid/list)
     * Details page (individual product)
   - Determine navigation depth:
     * Flat: listings directly from home
     * One level: categories → listings
     * Two levels: categories → subcategories → listings
     * Three+ levels: handle hierarchy

7) Discover sample URLs:
   - Navigate through site to find:
     * Sample category URL
     * Sample subcategory URL (if applicable)
     * Sample listings URL
     * Sample detail URL (if accessible from home/listings)
   - Document each URL with its purpose

=== STEP 5: Write Discovery State (JSON) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

8) Save discovery-state.json (USE ABSOLUTE PATH):
   ```json
   {
     "site_url": "<input_url>",
     "scraper_name": "<scraper_slug>",
     "discovered_at": "<timestamp>",
     "site_structure": {
       "has_categories": true/false,
       "has_subcategories": true/false,
       "has_listings": true/false,
       "navigation_depth": 1/2/3,
       "listing_pattern": "pagination"/"infinite_scroll"/"load_more"
     },
     "page_types_found": ["categories", "subcategories", "listings", "details"],
     "sample_urls": {
       "category": "https://example.com/categories",
       "subcategory": "https://example.com/categories/electronics",
       "listings": "https://example.com/categories/electronics/laptops",
       "detail": "https://example.com/p/123"
     },
     "navigation_notes": {
       "category_pattern": "Main menu uses dropdown",
       "pagination_pattern": "Query parameter ?page=2",
       "special_notes": "Site has search functionality"
     }
   }
   ```

=== STEP 6: Write Discovery Knowledge (Markdown) ===
**CRITICAL**: Use ABSOLUTE PATH for WriteFile operation

9) Save discovery-knowledge.md (USE ABSOLUTE PATH):
   ```markdown
   # Site Discovery Knowledge - <scraper_name>
   
   **Completed**: <timestamp>
   **Site URL**: <site_url>
   
   ## Site Structure Analysis
   
   ### Navigation Pattern
   - **Type**: Hierarchical (categories → subcategories → listings)
   - **Depth**: 2 levels
   - **Category Discovery**: Main menu dropdown
   - **Subcategory Discovery**: Sidebar on category pages
   
   ### Page Types Found
   1. **Categories**: Main navigation page
   2. **Subcategories**: Category detail pages
   3. **Listings**: Product listing pages
   4. **Details**: Individual product pages
   
   ### Sample URLs Discovered
   - **Category**: https://example.com/categories
     - Purpose: Entry point for category navigation
     - Notes: Contains 12 main categories
   
   - **Subcategory**: https://example.com/categories/electronics
     - Purpose: Shows subcategories within Electronics
     - Notes: 8 subcategories found
   
   - **Listings**: https://example.com/categories/electronics/laptops
     - Purpose: Product listing page
     - Notes: 24 products per page, pagination via ?page=2
   
   - **Detail**: https://example.com/p/123
     - Purpose: Individual product page
     - Notes: Accessible from listings page
   
   ## Navigation Patterns
   
   ### Category Navigation
   - **Selector Pattern**: Main menu dropdown
   - **URL Pattern**: /categories/<category-slug>
   - **Notes**: Categories are in main navigation, no separate categories page
   
   ### Pagination
   - **Type**: Query parameter
   - **Pattern**: ?page=2, ?page=3, etc.
   - **Products Per Page**: 24
   - **Notes**: Next button present, also supports direct page access
   
   ## Next Steps
   
   **For Navigation Parser Generation:**
   1. Use sample category URL to discover category link selectors
   2. Use sample subcategory URL to discover subcategory patterns
   3. Use sample listings URL to discover product link selectors and pagination
   
   **For Detail Parser Generation:**
   1. Use sample detail URL from listings discovery
   2. Extract product fields using discovered selectors
   
   ## Commands to Run Next
   
   ```bash
   /create-navigation-parser scraper=<scraper_slug>
   ```
   
   This will use discovery-state.json and discovery-knowledge.md to understand site structure.
   ```

=== STEP 7: Generate Seeder ===
10) Generate seeder/seeder.rb (USE ABSOLUTE PATH):
   ```ruby
   # Seeder for <scraper_slug>
   # Generated by Site Discovery
   
   # Initial pages to seed based on site structure
   pages << {
     url: "<site_url>",  # From discovery-state.json
     page_type: "<initial_page_type>",  # "categories" if has_categories, else "listings"
     method: "GET",
     vars: {
       base_url: "<base_url>",  # Extract from site_url
       store_name: "<scraper_slug>",
       country: nil,  # User can add later
       currency: nil  # User can add later
     }
   }
   ```
   
   **Determine initial_page_type:**
   - If discovery-state.json has_categories == true: page_type = "categories"
   - Else if has_listings == true: page_type = "listings"
   - Else: page_type = "categories" (default)

=== STEP 8: Generate Initial Config.yaml ===
11) Generate config.yaml (USE ABSOLUTE PATH):
   ```yaml
   seeder:
     file: ./seeder/seeder.rb
     disabled: false
   
   parsers: []
   # Parsers will be added by:
   # - create-navigation-parser: Adds categories, subcategories (if needed), listings
   # - create-details-parser: Adds details
   ```
   
   **Note**: This is an initial config.yaml with empty parsers array. Parsers will be added incrementally by subsequent commands.

=== STEP 9: Update Phase Status ===
12) Update phase-status.json (USE ABSOLUTE PATH):
   ```json
   "site_discovery": {
     "status": "completed",
     "completed_at": "<timestamp>",
     "discovered_patterns": ["hierarchical", "categories->listings->details"],
     "navigation_depth": 2
   }
   ```

13) Save browser-context.json (USE ABSOLUTE PATH):
   ```json
   {
     "last_url_visited": "<last_url_analyzed>",
     "last_phase": "site_discovery",
     "last_activity": "<timestamp>"
   }
   ```

=== STEP 10: Completion Report ===
14) Display completion summary:
   ```
   ✅ Site Discovery Complete
   
   Scraper: <scraper_slug>
   Site: <site_url>
   
   Discovered:
   - Navigation depth: <depth> levels
   - Page types: <list>
   - Sample URLs: <count> URLs documented
   
   Files Created:
   - generated_scraper/<scraper>/seeder/seeder.rb ✅
   - generated_scraper/<scraper>/config.yaml ✅ (initial, parsers will be added)
   - generated_scraper/<scraper>/.scraper-state/discovery-state.json ✅
   - generated_scraper/<scraper>/.scraper-state/discovery-knowledge.md ✅
   - generated_scraper/<scraper>/.scraper-state/field-spec.json ✅ (if spec provided)
   - generated_scraper/<scraper>/.scraper-state/phase-status.json ✅
   
   Next Command:
   /create-navigation-parser scraper=<scraper_slug>
   
   This command will read discovery-state.json and discovery-knowledge.md
   to generate navigation parsers.
   ```

**CRITICAL COMPLETION REQUIREMENTS:**
- ✅ seeder/seeder.rb generated (initial scraper entry point)
- ✅ config.yaml generated (initial config, parsers will be added later)
- ✅ field-spec.json written (if spec provided) - guides detail parser field discovery
- ✅ discovery-state.json written (machine-readable)
- ✅ discovery-knowledge.md written (human + AI readable)
- ✅ phase-status.json updated
- ✅ browser-context.json saved
- ✅ Completion report displayed with next steps

**This command is now COMPLETE and INDEPENDENT.**
**Next session can run /create-navigation-parser without any conversation history.**

Examples:
  # Basic usage (no field spec - will use common fields)
  /scrape-site url="https://naivas.online" name=naivas_online
  
  # With field specification (recommended)
  /scrape-site url="https://example.com" name=my_store spec="spec_general_sample.csv"
  
  # Custom output directory
  /scrape-site url="https://shop.com" --scraper shop spec="fields.csv" out="./custom_scrapers"
"""
